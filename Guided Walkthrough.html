he private <code>ServiceProviderRegistration<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const providerRegistrationForConfig = (config: RuntimeConfig): ServiceProviderRegistration =&gt; {\n  if (config.provider === \"openai\") {\n    return {\n      kind: \"openai\",\n      providerId: OPENAI_PROVIDER_ID,\n      modelIds: config.modelIds,\n      defaultModelId: config.defaultModelId,\n      apiKey: config.apiKey,            // ← secret stays on the private registration\n      ...\n    };\n  }\n  ...\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The bundle the factory returns deliberately does <strong>not<\u002Fstrong> carry the key:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceProviderBundle = (options): ServiceProviderBundle =&gt; {\n  const runtimeConfig = options.runtime ?? { provider: \"fake\" };\n  const registry = createServiceProviderRegistry([providerRegistrationForConfig(runtimeConfig)]);\n  return {\n    registry,\n    runtimeProviders: registry.providers,   // no apiKey field\n    defaultProviderId: registry.defaultProviderId,\n    defaultModelId: registry.defaultModelId,\n  };\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>What actually crosses into core and the HTTP routes is narrower still. <code>ServiceComposition.runtime<\u002Fcode> is typed as <code>AiRuntimePort<\u002Fcode>, and its doc comment is explicit: <em>\"Core and HTTP routes receive only runtime ids and the prepared AgentRuntime port.\"<\u002Fem> <code>AiRuntimePort<\u002Fcode> has no <code>apiKey<\u002Fcode> field, so a <code>/healthz<\u002Fcode> or <code>/models<\u002Fcode> response physically cannot leak Maya's deployment key — there is no field on the type to serialize.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Untyped config read deep in the call tree means a typo in an env var name surfaces as a runtime crash on a live request, not a startup failure. And keeping the secret on the private <code>ServiceProviderRegistration<\u002Fcode> — never on the bundle, never on the <code>AiRuntimePort<\u002Fcode> — means secret containment is structural, not a thing a future refactor has to remember to filter out.<\u002Fp>\n<hr>\n<h3 id=\"factory-creator\">Factory / creator<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A <code>create*<\u002Fcode> function that takes raw config and returns one named, pre-wired bundle. You ask for \"the tool station\" and get it already hot, not a pile of ingredients.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> A real body:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceToolBundle = (options: ServiceCompositionOptions): ServiceToolBundle =&gt; {\n  const runtimeConfig = options.runtime ?? { provider: \"fake\" };\n  const registry = createServiceToolRegistry(toolRegistrationsForConfig(runtimeConfig));\n  return {\n    registry,\n    runtimeTools: registry.runtimeTools,          // → agent-runtime executor\n    toolCapabilities: registry.toolCapabilities,  // → manifest\n  };\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The composition root sees only the <code>ServiceToolBundle<\u002Fcode> shape; the internal <code>toolRegistrationsForConfig<\u002Fcode> logic stays hidden. The bundle's two arrays guarantee both sides of the tool surface come from one source.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Without factories, the composition root becomes a 400-line function and you cannot test tool validation without standing up the whole service.<\u002Fp>\n<hr>\n<h3 id=\"capability\">Capability<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A capability is the <em>declaration<\u002Fem> of a tool, not the tool itself. \"This tool exists and takes this input.\"<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> <code>ToolCapability = { name, description, inputSchema }<\u002Fcode> — no <code>execute<\u002Fcode>. Its matching executable is a separate <code>RuntimeTool<\u002Fcode>, tied together only by the <code>ServiceToolRegistration<\u002Fcode> from the Registry section. For Maya, the capability is what core policy reads to decide exposure; the <code>RuntimeTool<\u002Fcode> is what actually calls the Jira client.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Keeping the declaration credential-free and execute-free is what lets the manifest be serialized, hashed, and shown to the model without ever shipping secrets or code.<\u002Fp>\n<hr>\n<h3 id=\"assistant-profile\">Assistant profile<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> The named persona for a turn: which model, which system prompt, which tools are allowed by default. Config goes in, a published profile comes out.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> The service config (<code>ServiceAssistantConfig<\u002Fcode>) carries prompt <em>sections<\u002Fem>, model, and tool policy. A <code>SystemPromptBuilder<\u002Fcode> (a strategy — just a function) joins the sections into the final prompt text, and the result becomes an <code>AssistantProfile<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type AssistantProfile = {\n  readonly profileId: ProfileId;\n  readonly systemInstructions: string;            // the built prompt text\n  readonly modelPolicy: ModelPolicy;               // { providerId, modelId }\n  readonly defaultToolPolicy: ToolExposurePolicy;  // { mode, allowedToolNames }\n  readonly safetyPolicy: SafetyPolicy;             // { turnGuardIds, ... }\n  // ...\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>For Maya, the profile's <code>defaultToolPolicy.allowedToolNames<\u002Fcode> is the upstream allowlist that <code>jira.search_issues<\u002Fcode> must be in before the turn decision can include it.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> The profile is published in the manifest as data; the prompt <em>builder<\u002Fem> (and the model credentials) stay in the registry. The model never gets the builder, only the built text.<\u002Fp>\n<hr>\n<h3 id=\"context-candidate\">Context candidate<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A piece of context that <em>might<\u002Fem> go into the model's window — Maya's current message, prior history, the dashboard page metadata. It only becomes model-visible after admission.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> Each candidate carries provenance and a trust label before any budgeting:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type ContextCandidate = {\n  readonly candidateId: ContextCandidateId;\n  readonly sourceType: ContextCandidateSourceType;  // 'host_context', 'conversation_history', ...\n  readonly trustLevel: ContextTrustLevel;           // 'untrusted_external' for page metadata\n  readonly content: string;\n  readonly estimatedTokens: number;\n  readonly priority: number;\n  readonly provenance: ContextCandidateProvenance;\n  // ...\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Admission fits candidates into the token budget, dropping some with a stable <code>dropReason<\u002Fcode> (<code>'budget_exceeded'<\u002Fcode>, etc.). Maya's dashboard page context arrives as a candidate tagged <code>untrusted_external<\u002Fcode>, so when it is rendered into the context board the model is told it is reference data, not instructions.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Trust and token cost are decided <em>before<\u002Fem> the text reaches the model, so a malicious page title cannot smuggle itself in as a system instruction.<\u002Fp>\n<hr>\n<h3 id=\"policy\">Policy<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> The final business gate: rate limits, entitlements, model availability. \"Is Maya allowed to do this right now?\"<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> A port returning a grant or a denial:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type PolicyPort = {\n  readonly evaluate: (input: PolicyEvaluationInput) =&gt; Effect.Effect&lt;PolicyDecision, unknown&gt;;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>A denial carries a <code>code<\u002Fcode> (e.g. <code>'rate_limit_exceeded'<\u002Fcode>), a <code>protocolCode<\u002Fcode>, and a <code>retryable<\u002Fcode> flag, mapped to an error before any persistence runs.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Policy runs before conversation writes and runtime work, so a rate-limited Maya gets a clean rejection, not a half-created turn row.<\u002Fp>\n<hr>\n<h3 id=\"guard\">Guard<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A pre-model safety check on the raw user text. It runs <em>before<\u002Fem> context or tools are assembled and it fails closed.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> The guard's input is deliberately small — it sees the text, authority, profile, and safety policy, but <strong>not<\u002Fstrong> the prepared context or tool schemas:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type TurnGuardInput = {\n  readonly userMessage: string;     // \"show me my open Jira tickets\"\n  readonly authContext: AuthContext;\n  readonly profileId: string;\n  readonly safetyPolicyId: string;\n  // no preparedContext, no tools — by design\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>A guard returns <code>{ kind: 'allow' }<\u002Fcode>, <code>'allow_with_warning'<\u002Fcode>, or <code>'block'<\u002Fcode>. A <code>block<\u002Fcode> fails the whole turn. Fail-closed: if a profile names a guard id that is missing from the registry, the turn is rejected rather than run unguarded.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> If guards ran <em>after<\u002Fem> context preparation, a prompt-injection payload would already have been handed the system prompt and tool names it needs to craft a better attack. The narrow input shape enforces the ordering structurally.<\u002Fp>\n<hr>\n<h3 id=\"noop-adapter\">Noop adapter<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A real adapter that does nothing — an empty implementation that satisfies the port so the system runs without the real thing wired in.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> The turn-guard registry's noop is literally an empty list:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createNoopTurnGuardRegistry = (): TurnGuardRegistryPort =&gt; ({ guards: [] });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The guard loop in core iterates zero entries and allows every turn. The file comment is explicit that real deployments must replace it. So for Maya, in the current RC build, no content-safety check runs before the model.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Because it is an adapter, not an <code>if (env === 'dev')<\u002Fcode> branch in core, swapping in a real content-safety guard is a one-line change at the composition root — core never changes.<\u002Fp>\n<hr>\n<h2 id=\"7-hands-on-add-a-search-jira-tool-end-to-end\">7. Hands-On: Add a \"Search Jira\" Tool, End to End<\u002Fh2>\n<p>This is the payoff. You have heard \"tool flow\" thrown around and it sounded like magic. It is not. A tool is two plain objects tied together by a shared name, registered once, then checked by several independent gates before the model can ever touch it. Let's build the real <code>jira.search_issues<\u002Fcode> tool that answers Maya's \"show me my open Jira tickets\" and follow her request through every gate.<\u002Fp>\n<h3 id=\"the-idea\">The idea<\u002Fh3>\n<p>A \"tool\" is a function you let the model call. But the model is not trusted, so you split each tool into two halves:<\u002Fp>\n<ul><li><strong>The menu card<\u002Fstrong> the model reads — name, description, a JSON schema of inputs. The model uses this to decide <em>whether<\u002Fem> to call it. It never sees the code.<\u002Fli><li><strong>The recipe card<\u002Fstrong> the server runs — the actual <code>execute<\u002Fcode> function. The model never sees this either.<\u002Fli><\u002Ful>\n<p>Think of a restaurant. The diner reads a menu (the capability) and orders a dish by name. The kitchen has a recipe (the executable) for that exact name. A head waiter checks tonight's order ticket (the turn policy) to confirm the diner is allowed that dish <em>tonight<\u002Fem>, in <em>this<\u002Fem> room. Three different people, one dish name tying them together.<\u002Fp>\n<p>The whole point: <strong>you physically cannot declare a dish on the menu with no recipe behind it, and the model can only order from the ticket it was handed.<\u002Fstrong><\u002Fp>\n<hr>\n<h3 id=\"step-1-write-the-executable-runtimetool\">Step 1 — Write the executable (<code>RuntimeTool<\u002Fcode>)<\u002Fh3>\n<p>The executable is a <code>RuntimeTool<\u002Fcode>: a name, a description, the input schema, and an <code>execute<\u002Fcode> function. <code>execute<\u002Fcode> receives two things — the <code>input<\u002Fcode> the model produced (a plain <code>JsonObject<\u002Fcode>), and a <code>RuntimeToolContext<\u002Fcode> carrying the trusted server-side <code>scope<\u002Fcode>.<\u002Fp>\n<p>From the real <code>jira-search-issues-tool.ts<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createJiraSearchIssuesTool = ({ jiraClient }): RuntimeTool =&gt; ({\n  name: JIRA_SEARCH_ISSUES_TOOL_NAME,            // \"jira.search_issues\"\n  description: \"Search Jira issues the current user may access...\",\n  inputSchema: JIRA_SEARCH_ISSUES_INPUT_SCHEMA,\n  readSources: readJiraIssueSources,\n  execute: (input, context) =&gt;\n    Effect.gen(function* () {\n      const searchInput = yield* readJiraSearchIssuesInput(input); // { query, maxResults }\n      const scope = yield* readJiraToolScope(context);             // requires context.scope\n      const issues = yield* jiraClient.searchIssues({\n        query: searchInput.query,\n        maxResults: searchInput.maxResults,\n        requestId: context.requestId,\n        hostAppId: scope.hostAppId,\n        workspaceId: scope.workspaceId,\n        subjectId: scope.subjectId,       // Maya's id — Jira enforces per-user visibility\n        conversationId: scope.conversationId,\n        assistantTurnId: scope.assistantTurnId,\n        abortSignal: context.abortSignal,\n      }).pipe(Effect.mapError(toJiraToolError));\n      return toJiraSearchIssuesResult(issues);   // normalized JsonObject\n    }).pipe(Effect.mapError(toJiraToolError)),\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Two things to notice, because they are the crux of why tools are safe.<\u002Fp>\n<p><strong>What <code>execute<\u002Fcode> receives.<\u002Fstrong> The model only ever sends <code>{ query, maxResults }<\u002Fcode>. For Maya that is <code>{ query: \"sprint 42 open bugs\", maxResults: 10 }<\u002Fcode>. Everything that decides <em>whose<\u002Fem> tickets — <code>hostAppId<\u002Fcode>, <code>workspaceId<\u002Fcode>, <code>subjectId<\u002Fcode> — comes from <code>context.scope<\u002Fcode>, which the server injected. The model cannot influence it. If a hostile prompt tried to ask for <em>another<\u002Fem> user's tickets, it has no field to do so; <code>subjectId<\u002Fcode> is Maya's, full stop.<\u002Fp>\n<p>Where does that scope come from? Step 5 builds a <code>toolScope<\u002Fcode> object on the request. The AI SDK adapter (<code>ai-sdk-tool-adapter.ts<\u002Fcode>) then wires it onto each tool's context with <code>createRuntimeToolContext<\u002Fcode>, which sets <code>scope: request.toolScope<\u002Fcode>. So the <code>context.scope<\u002Fcode> that <code>readJiraToolScope<\u002Fcode> reads here <em>is<\u002Fem> the <code>toolScope<\u002Fcode> from <code>buildModelTurnRequest<\u002Fcode> — that is the loop being closed, and we'll see the other end of it in step 5.<\u002Fp>\n<p><code>readJiraToolScope<\u002Fcode> fails closed: if <code>context.scope<\u002Fcode> is missing, the tool returns <code>AiRuntimeError(TOOL_FAILED, \"jira.search_issues requires runtime tool scope.\")<\u002Fcode> rather than calling Jira with <code>undefined<\u002Fcode> ids.<\u002Fp>\n<p><strong>What <code>execute<\u002Fcode> returns.<\u002Fstrong> Not raw Jira API junk — a normalized <code>JsonObject<\u002Fcode>. <code>toJiraSearchIssuesResult<\u002Fcode> flattens each issue to four fields:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const toJiraSearchIssuesResult = (issues) =&gt; ({\n  count: issues.length,\n  issues: issues.map((issue) =&gt;\n    compactJsonObject({ key: issue.key, summary: issue.summary, status: issue.status, url: issue.url })),\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So Maya's call returns:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">json<\u002Fspan><pre><code>{ \"count\": 3, \"issues\": [\n  { \"key\": \"PRJ-101\", \"summary\": \"Login fails on mobile\", \"status\": \"In Progress\", \"url\": \"https://jira.example.com/browse/PRJ-101\" },\n  { \"key\": \"PRJ-98\",  \"summary\": \"API timeout on search endpoint\", \"status\": \"Open\", \"url\": \"https://jira.example.com/browse/PRJ-98\" },\n  { \"key\": \"PRJ-95\",  \"summary\": \"Dark mode flicker on dashboard\", \"status\": \"Open\", \"url\": \"https://jira.example.com/browse/PRJ-95\" }\n] }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That <code>readSources<\u002Fcode> field is a bonus. On the completed tool result it produces protocol-safe <code>{ label, url }<\u002Fcode> source metadata; the runtime mapper copies that onto the activity event, and the <em>widget<\u002Fem> renders those as clickable links. The runtime itself renders no UI — it only attaches data. We'll see it fire in step 6.<\u002Fp>\n<hr>\n<h3 id=\"step-2-write-the-capability-toolcapability\">Step 2 — Write the capability (<code>ToolCapability<\u002Fcode>)<\u002Fh3>\n<p>The capability is what the <em>model<\u002Fem> sees. Three fields, no code:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>{\n  name: JIRA_SEARCH_ISSUES_TOOL_NAME,           // \"jira.search_issues\"\n  description: \"Search Jira issues visible to the current user.\",\n  inputSchema: JIRA_SEARCH_ISSUES_INPUT_SCHEMA, // { query, maxResults }, required: ['query']\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The <code>inputSchema<\u002Fcode> is the contract the model fills in. The real schema:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const JIRA_SEARCH_ISSUES_INPUT_SCHEMA = {\n  type: \"object\",\n  properties: {\n    query:      { type: \"string\",  description: \"Jira issue search text or JQL fragment.\" },\n    maxResults: { type: \"integer\", minimum: 1, maximum: 25, description: \"Maximum issues to return.\" },\n  },\n  required: [\"query\"],\n  additionalProperties: false,\n} as const satisfies JsonObject;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>No <code>subjectId<\u002Fcode>, no <code>workspaceId<\u002Fcode> in the schema — those are server concerns, deliberately invisible to the model. The model can only produce <code>query<\u002Fcode> and <code>maxResults<\u002Fcode>.<\u002Fp>\n<p>And the schema's <code>minimum<\u002Fcode>/<code>maximum<\u002Fcode> is belt-and-suspenders, because the runtime does not trust the model to honor it. <code>readMaxResults<\u002Fcode> clamps server-side — anything missing or outside <code>1..25<\u002Fcode> silently falls back to <code>10<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const readMaxResults = (value) =&gt;\n  typeof value === \"number\" &amp;&amp; Number.isInteger(value) &amp;&amp; value &gt;= 1 &amp;&amp; value &lt;= 25 ? value : 10;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That is the \"model is not trusted\" theme made concrete: even if the model ignores the schema and asks for <code>maxResults: 9999<\u002Fcode>, the server quietly caps it.<\u002Fp>\n<hr>\n<h3 id=\"step-3-pair-them-createservicetoolregistration\">Step 3 — Pair them (<code>createServiceToolRegistration<\u002Fcode>)<\u002Fh3>\n<p>You never register the two halves separately. You bundle them in one call, and the registration name is taken from <code>runtimeTool.name<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createJiraSearchIssuesRegistration = ({ jiraClient }): ServiceToolRegistration =&gt;\n  createServiceToolRegistration({\n    capability: {\n      name: JIRA_SEARCH_ISSUES_TOOL_NAME,\n      description: \"Search Jira issues visible to the current user.\",\n      inputSchema: JIRA_SEARCH_ISSUES_INPUT_SCHEMA,\n    },\n    runtimeTool: createJiraSearchIssuesTool({ jiraClient }),\n  });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>createServiceToolRegistration<\u002Fcode> simply stamps the name from the executable:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceToolRegistration = ({ capability, runtimeTool, ... }) =&gt; ({\n  name: runtimeTool.name,   // the canonical key everything else checks against\n  capability,\n  runtimeTool,\n  defaultEnabled,\n  approvalPolicyIds,\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>This is the structural guarantee: the menu card and the recipe card travel together in one object. You cannot create the registration with only one half.<\u002Fp>\n<hr>\n<h3 id=\"step-4-register-and-split-createservicetoolregistry\">Step 4 — Register and split (<code>createServiceToolRegistry<\u002Fcode>)<\u002Fh3>\n<p>At service startup, <code>createServiceToolBundle<\u002Fcode> hands all registrations to <code>createServiceToolRegistry<\u002Fcode>. It does two jobs: <strong>validate<\u002Fstrong>, then <strong>split<\u002Fstrong>.<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceToolRegistry = (registrations) =&gt; {\n  const seenNames = new Set&lt;string&gt;();\n  for (const registration of registrations) {\n    assertMatchingNames(registration);   // capability.name === runtimeTool.name === registration.name\n    assertUniqueName(seenNames, registration.name);\n  }\n  return {\n    toolCapabilities: registrations.map((r) =&gt; r.capability),  // → the manifest (the model's menu)\n    runtimeTools:     registrations.map((r) =&gt; r.runtimeTool), // → agent-runtime (the executables)\n    defaultEnabledToolNames: registrations.filter((r) =&gt; r.defaultEnabled).map((r) =&gt; r.name),\n    status: { tools: registrations.map(toToolStatus) },\n  };\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>assertMatchingNames<\u002Fcode> is the <strong>first gate<\u002Fstrong>, and it fires at boot. If a teammate renames the capability to <code>jira.search<\u002Fcode> but forgets the runtime tool, the process throws before the HTTP server accepts a single connection:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>throw new ServiceToolRegistryError(\n  `Tool registration jira.search must match capability jira.search and runtime tool jira.search_issues.`,\n);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The server never starts. Compare that to a <code>switch (toolName)<\u002Fcode> handler, where the same typo surfaces only when the model calls the bad name on a real request — and silently returns <code>undefined<\u002Fcode>.<\u002Fp>\n<p>After this step the two surfaces go separate ways:<\u002Fp>\n<ul><li><code>toolCapabilities<\u002Fcode> → <code>HostCapabilityManifest.tools<\u002Fcode> — the menu the model may <em>ever<\u002Fem> see.<\u002Fli><li><code>runtimeTools<\u002Fcode> → the agent-runtime <code>ToolRegistry<\u002Fcode>, a <code>Map&lt;string, RuntimeTool&gt;<\u002Fcode> — the only place an executable lives.<\u002Fli><\u002Ful>\n<hr>\n<h3 id=\"step-5-at-turn-time-name-only-allowlist-crosses-the-boundary\">Step 5 — At turn time: name-only allowlist crosses the boundary<\u002Fh3>\n<p>Maya hits send. Core loads the manifest, asks the turn policy for a decision, and <strong>validates<\u002Fstrong> it. The decision's <code>allowedToolNames<\u002Fcode> is a closed allowlist, and <code>validateTurnPolicyDecision<\u002Fcode> applies several independent checks to it. Two of them are the next gates on our tool:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// Gate 2 — manifest check: the tool must be declared in this deployment\nconst manifestToolIssues = unknownValueIssues(decision.allowedToolNames, manifestToolNamesSet, ...);\n// Gate 3 — profile check: the tool must be in THIS profile's allowlist\nconst profileToolIssues = unknownValueIssues(\n  decision.allowedToolNames, new Set(profile.defaultToolPolicy.allowedToolNames), ...);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So the count earlier was not hand-waving — here are the gates, concretely:<\u002Fp>\n<div class=\"tablewrap\"><table><thead><tr><th>Gate<\u002Fth><th>Where<\u002Fth><th>What it proves<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>1. boot-time name match<\u002Ftd><td><code>assertMatchingNames<\u002Fcode> (step 4)<\u002Ftd><td>the capability and the executable share one name; no phantom tools<\u002Ftd><\u002Ftr><tr><td>2. per-turn manifest check<\u002Ftd><td><code>manifestToolIssues<\u002Fcode><\u002Ftd><td>the tool is actually declared in <em>this<\u002Fem> deployment's manifest<\u002Ftd><\u002Ftr><tr><td>3. per-turn profile check<\u002Ftd><td><code>profileToolIssues<\u002Fcode><\u002Ftd><td>the tool is in <em>this<\u002Fem> assistant profile's allowlist<\u002Ftd><\u002Ftr><tr><td>(4. approval policy)<\u002Ftd><td><code>approvalRequirementIssues<\u002Fcode><\u002Ftd><td>a separate gate — any required human approval is present<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<p><code>validateTurnPolicyDecision<\u002Fcode> runs gates 2, 3, and 4 together (alongside profile-identity checks) and rejects the decision if <em>any<\u002Fem> of them produces an issue.<\u002Fp>\n<p>For Maya the validated decision looks like this. Note these are illustrative values for her deployment — the repo's own fixtures use <code>profileId: 'analyst'<\u002Fcode> with a fake provider — and the object carries more required fields than the five shown (<code>profileVersion<\u002Fcode>, <code>allowedCommandNames<\u002Fcode>, <code>approvalRequirements<\u002Fcode>, <code>manifestHash<\u002Fcode>; see <code>capabilities.ts:199<\u002Fcode>):<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">json<\u002Fspan><pre><code>{ \"allowedToolNames\": [\"jira.search_issues\"], \"executorId\": \"ai-sdk-tool-loop\",\n  \"providerId\": \"openai\", \"modelId\": \"gpt-5.4-mini\", \"profileId\": \"default\",\n  \"profileVersion\": \"...\", \"allowedCommandNames\": [], \"approvalRequirements\": [], \"manifestHash\": \"sha256:...\" }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>buildModelTurnRequest<\u002Fcode> then maps that into the request the runtime receives. The critical line is <code>toolNames<\u002Fcode> — <strong>names only, no schemas, no executors<\u002Fstrong>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const buildModelTurnRequest = (input, turn): AiRuntimeRequest =&gt; ({\n  // ...\n  toolNames: turn.policyDecision.allowedToolNames,    // ['jira.search_issues']\n  toolScope: {\n    hostAppId: input.hostAppId,\n    workspaceId: turn.authContext.workspaceId,\n    subjectId: turn.authContext.subject.subjectId,    // Maya — injected here, trusted\n    conversationId: turn.conversation.conversationId,\n    assistantTurnId: turn.assistantTurnId,\n    allowedHostCommandNames: turn.policyDecision.allowedCommandNames,\n  },\n  // ...\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>This is the architectural seam. <strong>Before<\u002Fstrong> this line, a tool is just a string. <strong>After<\u002Fstrong> it, agent-runtime will resolve that string to an executable. Core is policy-only and never touches <code>execute<\u002Fcode>; agent-runtime is execution-only and never touches product policy.<\u002Fp>\n<p>And here is the other end of the loop from step 1: that <code>toolScope<\u002Fcode> is exactly what becomes <code>context.scope<\u002Fcode> inside the executable. The AI SDK adapter (<code>ai-sdk-tool-adapter.ts<\u002Fcode>) sets <code>scope: request.toolScope<\u002Fcode> in <code>createRuntimeToolContext<\u002Fcode> when it wraps each <code>RuntimeTool<\u002Fcode> — which is the value <code>readJiraToolScope<\u002Fcode> reads back. <code>toolScope<\u002Fcode> is how the executable learns it is running for Maya without the model ever supplying her id.<\u002Fp>\n<p>Inside agent-runtime, <code>selectRuntimeToolsByName<\u002Fcode> turns the names back into executables:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const selectRuntimeToolsByName = (registry, selectedNames) =&gt;\n  selectedNames.map((name) =&gt; registry.resolve(name));   // throws TOOL_UNAVAILABLE on a miss<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The AI SDK adapter then wraps each <code>RuntimeTool<\u002Fcode> so the model sees its description and <code>inputSchema<\u002Fcode> — and only now does the model know <code>jira.search_issues<\u002Fcode> is on the table this turn.<\u002Fp>\n<hr>\n<h3 id=\"step-6-the-loop-call-execute-activity-answer\">Step 6 — The loop: call, execute, activity, answer<\u002Fh3>\n<p>Now the model runs. The AI SDK <code>ToolLoopAgent<\u002Fcode> streams parts; each one maps to a <code>RuntimeEvent<\u002Fcode>, which maps to a browser-visible <code>sidechat.activity<\u002Fcode> or <code>sidechat.delta<\u002Fcode>.<\u002Fp>\n<figure class=\"dgm\"><div class=\"mapwrap\"><div class=\"map\"><div class=\"mh\">model / AI SDK<\u002Fdiv><div><\u002Fdiv><div class=\"mh\">runtime event<\u002Fdiv><div><\u002Fdiv><div class=\"mh\">browser event<\u002Fdiv><div class=\"mcell\">model emits tool-input-start<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">runtime.activity (running, input {})<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">sidechat.activity “Searching Jira”<\u002Fdiv><div class=\"mcell\">model emits tool-call<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">runtime.activity (running, input {query})<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">sidechat.activity (same row, input filled in)<\u002Fdiv><div class=\"mcell\">AI SDK invokes execute<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">jiraClient.searchIssues({ subjectId: Maya })<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">{ count: 3, issues: [...] }<\u002Fdiv><div class=\"mcell\">model receives tool-result<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">runtime.activity (completed, result+sources)<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">sidechat.activity (same row, done)<\u002Fdiv><div class=\"mcell\">model writes its answer<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">runtime.output_delta ×N<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">sidechat.delta “Here are your open bugs…”<\u002Fdiv><div class=\"mcell\">stream ends<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell\">runtime.completed<\u002Fdiv><span class=\"arrow\">→<\u002Fspan><div class=\"mcell hot\">sidechat.completed<\u002Fdiv><\u002Fdiv><\u002Fdiv><figcaption class=\"dgm-cap\">All three tool events share one <span class=\"mc\">activityId<\u002Fspan> (the <span class=\"mc\">toolCallId<\u002Fspan>) — so Maya sees one row update in place.<\u002Ffigcaption><\u002Ffigure>\n<p>The key UX trick: <strong>all three tool events share one <code>activityId<\u002Fcode> (the <code>toolCallId<\u002Fcode>).<\u002Fstrong> So Maya sees a single \"Searching Jira\" row that updates in place — <em>running<\u002Fem> → <em>running with the query<\u002Fem> → <em>completed with clickable tickets<\u002Fem> — rather than three separate rows flickering by.<\u002Fp>\n<p>That <code>readSources<\u002Fcode> from step 1 fires on the result part. <code>mapToolResult<\u002Fcode> calls it and copies the resulting <code>{ label, url }<\u002Fcode> metadata onto <code>details.tool.sources<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const sources = runtimeTools.get(part.toolName)?.readSources?.(result);\n// → [{ label: 'PRJ-101', url: 'https://jira.example.com/browse/PRJ-101' }, ...]<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The completed activity event Maya's panel renders looks like this. Envelope fields (<code>protocolVersion<\u002Fcode>, <code>eventId<\u002Fcode>, <code>assistantTurnId<\u002Fcode>, <code>sequence<\u002Fcode>, <code>createdAt<\u002Fcode>) are omitted here for clarity — every real event carries them; see <code>packages/chat-protocol/src/fixtures/activity-stream.json<\u002Fcode> for the full shape:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">json<\u002Fspan><pre><code>{ \"type\": \"sidechat.activity\", \"activityId\": \"tcall_01\", \"activityKind\": \"tool\",\n  \"status\": \"completed\", \"title\": \"Searching Jira\",\n  \"details\": { \"tool\": {\n    \"toolCallId\": \"tcall_01\",\n    \"toolName\": \"jira.search_issues\",\n    \"input\": { \"query\": \"sprint 42 open bugs\" },\n    \"result\": { \"count\": 3, \"issues\": [...] },\n    \"sources\": [{ \"label\": \"PRJ-101\", \"url\": \"...\" }, { \"label\": \"PRJ-98\", \"url\": \"...\" }, ...]\n  } } }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The AI SDK then feeds the result back into the conversation automatically, the model writes its summary, and that text streams to Maya as <code>sidechat.delta<\u002Fcode> events. She reads \"Here are your 3 open tickets…\" with PRJ-101, PRJ-98, PRJ-95 linked right in the activity row.<\u002Fp>\n<hr>\n<h3 id=\"this-same-shape-adds-any-tool\">This same shape adds <em>any<\u002Fem> tool<\u002Fh3>\n<p>Nothing above was Jira-specific except the body of <code>execute<\u002Fcode>. To add a Slack search, a calendar lookup, a database query — you write the same four things:<\u002Fp>\n<ol><li>a <code>RuntimeTool<\u002Fcode> with an <code>execute(input, context)<\u002Fcode>,<\u002Fli><li>a <code>ToolCapability<\u002Fcode> with a matching <code>name<\u002Fcode> + <code>inputSchema<\u002Fcode>,<\u002Fli><li>one <code>createServiceToolRegistration({ capability, runtimeTool })<\u002Fcode>,<\u002Fli><li>drop it into the bundle.<\u002Fli><\u002Fol>\n<p>The manifest, policy, request builder, registry, and stream loop do not change. They are generic over \"a tool.\"<\u002Fp>\n<h3 id=\"the-safety-guarantees-restated\">The safety guarantees, restated<\u002Fh3>\n<p>The name <code>jira.search_issues<\u002Fcode> lives in five places and they cannot drift:<\u002Fp>\n<div class=\"tablewrap\"><table><thead><tr><th>Where<\u002Fth><th>Who checks it<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><code>JIRA_SEARCH_ISSUES_TOOL_NAME<\u002Fcode> constant<\u002Ftd><td>source of truth<\u002Ftd><\u002Ftr><tr><td><code>ToolCapability.name<\u002Fcode> (manifest)<\u002Ftd><td><code>assertMatchingNames<\u002Fcode> at boot (gate 1)<\u002Ftd><\u002Ftr><tr><td><code>RuntimeTool.name<\u002Fcode> (registry)<\u002Ftd><td><code>assertMatchingNames<\u002Fcode> at boot (gate 1)<\u002Ftd><\u002Ftr><tr><td><code>TurnPolicyDecision.allowedToolNames<\u002Fcode><\u002Ftd><td><code>manifestToolIssues<\u002Fcode> + <code>profileToolIssues<\u002Fcode> per turn (gates 2 and 3)<\u002Ftd><\u002Ftr><tr><td>AI SDK <code>ToolSet<\u002Fcode> key<\u002Ftd><td>flows from the validated allowlist<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<p>Three guarantees fall out of this:<\u002Fp>\n<ul><li><strong>You cannot declare a tool with no executable.<\u002Fstrong> Capability and <code>RuntimeTool<\u002Fcode> are born in one <code>ServiceToolRegistration<\u002Fcode>; the registry rejects a mismatch at boot.<\u002Fli><li><strong>Names are validated before the server starts.<\u002Fstrong> A typo is a startup crash with the exact bad name, not a silent mid-stream failure.<\u002Fli><li><strong>The runtime only ever receives allowed names.<\u002Fstrong> Core sends a closed allowlist that was checked against both the deployment's manifest and the active profile. A tool Maya's workspace never enabled cannot reach the model, even if the model would love to call it.<\u002Fli><\u002Ful>\n<p>See <strong>Section 5 (Life of a turn)<\u002Fstrong> for how this tool call sits inside the full request pipeline, and <strong>Section 6<\u002Fstrong> for the deeper manifest-vs-registry distinction.<\u002Fp>\n<hr>\n<h2 id=\"8-how-to-navigate-this-codebase\">8. How to Navigate This Codebase<\u002Fh2>\n<p>This is your field guide. Most of the time you arrive with a question, not a tour request, so we start there: the three questions that account for most \"where the heck is X\" moments. Then a reading order, a heuristic for placing any file by its path, the honest rough edges, and where the tests pin behavior.<\u002Fp>\n<h3 id=\"81-the-three-questions-you-will-actually-ask\">8.1 The three questions you will actually ask<\u002Fh3>\n<p><strong>\"Where is the system prompt built?\"<\u002Fstrong><\u002Fp>\n<p>Two answers, because there are two layers.<\u002Fp>\n<p>The <em>text<\u002Fem> of the default assistant's prompt is a plain string constant in <code>apps/partner-ai-service/src/composition/assistant/default-assistant-config.ts<\u002Fcode>. There is no template engine, no DB lookup — it is a literal:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const DEFAULT_OUTPUT_FORMATTING_SECTION =\n  \"Render final assistant answers as GitHub-flavored Markdown. Use bullet or numbered lists when the answer contains multiple items, preserve emphasis with Markdown syntax, and keep tool payload JSON out of the visible answer unless the user explicitly asks for raw data.\";<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That string is wrapped in a <em>section<\u002Fem> — a tiny <code>{ id, content }<\u002Fcode> object — and a prompt is just an ordered array of those sections:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>prompt: {\n  promptId: DEFAULT_ASSISTANT_SYSTEM_PROMPT_ID,\n  sections: [{ id: \"output_formatting\", content: DEFAULT_OUTPUT_FORMATTING_SECTION }],\n},<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So \"build the system prompt\" means \"join these sections into one string.\" That joining is the strategy in <code>apps/partner-ai-service/src/composition/assistant/system-prompt-builder.ts<\u002Fcode> (<code>createDefaultSystemPromptBuilder<\u002Fcode>), which maps each section to its <code>content<\u002Fcode> and joins with <code>\\n\\n<\u002Fcode>. One more section in the array means one more paragraph in the prompt — nothing else changes.<\u002Fp>\n<p>The <em>assembly<\u002Fem> — where that built text becomes the first message the model sees — is <code>buildModelMessages<\u002Fcode> inside <code>packages/partner-ai-core/src/application/stream-chat/model-request/build-model-turn-request.ts<\u002Fcode>. It is five lines, and the ordering is the whole point:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const buildModelMessages = (turn) =&gt; {\n  const contextBoardMessage = renderContextBoardMessage(turn.preparedContext.contextBoard);\n  return [\n    { role: \"system\", content: turn.policyDecision.systemInstructions },\n    ...(contextBoardMessage ? [contextBoardMessage] : []),\n    ...turn.preparedContext.runtimeMessages,\n  ];\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>System instructions first, then the context-board message (only if there is one — note the <code>? [x] : []<\u002Fcode>, so it is <code>undefined<\u002Fcode>-safe and simply absent when no sections were admitted), then <code>runtimeMessages<\u002Fcode> (admitted history + Maya's current \"show me my open Jira tickets\" as <code>role: 'user'<\u002Fcode>). No caller can reorder this; the contract is in the code.<\u002Fp>\n<p><strong>\"Where are tools registered?\"<\u002Fstrong><\u002Fp>\n<p><code>apps/partner-ai-service/src/composition/tools/service-tool-registry.ts<\u002Fcode> — <code>createServiceToolRegistry<\u002Fcode>. This is the boot-time validator that pairs each <code>ToolCapability<\u002Fcode> (what the model sees) with its <code>RuntimeTool<\u002Fcode> (what actually runs), asserts their names match, and rejects duplicates. The individual tool, like Maya's <code>jira.search_issues<\u002Fcode>, is declared in <code>apps/partner-ai-service/src/adapters/tools/examples/jira-search-issues-tool.ts<\u002Fcode>.<\u002Fp>\n<p><strong>\"Where does a turn start?\"<\u002Fstrong><\u002Fp>\n<p><code>apps/partner-ai-service/src/inbound/http/routes/chat/chat-stream.ts<\u002Fcode> — the <code>POST /chat/stream<\u002Fcode> route. It parses the body, then calls <code>streamChatEffect(...)<\u002Fcode> and pulls the first event:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const firstEvent = await eventIterator.next();\nreturn streamingSseResponse({ events: prependFirstEvent(firstEvent, eventIterator), ... });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That <code>await eventIterator.next()<\u002Fcode> line is the load-bearing boundary in the whole system. It runs all the pre-start work (auth, policy, guards, persistence) and only resolves once <code>sidechat.started<\u002Fcode> is queued. Fail before it → plain JSON error via <code>mapServiceError<\u002Fcode>. Fail after it → the SSE body is already open, so the failure must arrive as a <code>sidechat.error<\u002Fcode> event.<\u002Fp>\n<h3 id=\"82-recommended-reading-order\">8.2 Recommended reading order<\u002Fh3>\n<p>Read these five in order. Each one makes the next one legible.<\u002Fp>\n<ol><li><strong>The protocol contract — <code>packages/chat-protocol/src/sidechat-v1/events/event-union.ts<\u002Fcode>.<\u002Fstrong> Start here because every other layer either produces or consumes these event types (<code>sidechat.started<\u002Fcode>, <code>sidechat.delta<\u002Fcode>, <code>sidechat.activity<\u002Fcode>, <code>sidechat.completed<\u002Fcode>, <code>sidechat.error<\u002Fcode>). Once you know the wire shapes, the rest of the system is \"how do we produce these in order.\"<\u002Fli><li><strong>The core use case — <code>packages/partner-ai-core/src/application/stream-chat/stream-chat.ts<\u002Fcode>.<\u002Fstrong> Small file. It composes the two halves of a turn: <code>prepareStreamChatTurn<\u002Fcode> (the all-or-nothing preflight) and <code>createProtocolEventStream<\u002Fcode> (the live stream). Read it to see the two-phase shape; drill into the preflight steps after.<\u002Fli><li><strong>The hands-on tool example (Section 7).<\u002Fstrong> Now that you know the contract and the use case, follow one concrete tool — <code>jira.search_issues<\u002Fcode> — from declaration through registry, policy, request, execution, and activity events. This is where the abstract pieces snap into a single thread.<\u002Fli><li><strong>The composition root — <code>apps/partner-ai-service/src/composition/service-composition.ts<\u002Fcode>.<\u002Fstrong> This is the only place dependencies are instantiated. Read it as a dependency graph: providers → tools → assistants → capabilities → runtime → ports. Each <code>create*Bundle<\u002Fcode> call is a factory in <code>apps/partner-ai-service/src/composition/factories/<\u002Fcode>.<\u002Fli><li><strong>The runtime — <code>packages/agent-runtime/src/runtime/ai-sdk/streaming/tool-loop-agent-runner.ts<\u002Fcode>.<\u002Fstrong> Read this last. It is the only layer that talks to the AI SDK and the provider. By now you know exactly what it receives (<code>AiRuntimeRequest<\u002Fcode> with a closed <code>toolNames<\u002Fcode> list) and what it must emit (<code>RuntimeEvent<\u002Fcode>s that map to the protocol).<\u002Fli><\u002Fol>\n<h3 id=\"83-the-path-to-layer-heuristic\">8.3 The path-to-layer heuristic<\u002Fh3>\n<p>You can usually tell what a file does by where it lives. Match the path against this table:<\u002Fp>\n<div class=\"tablewrap\"><table><thead><tr><th>Path fragment<\u002Fth><th>Layer<\u002Fth><th>What you'll find<\u002Fth><th>Allowed to import<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><code>partner-ai-core/src/domain/<\u002Fcode><\u002Ftd><td>Domain<\u002Ftd><td>Pure types and validation (manifest, <code>TurnPolicyDecision<\u002Fcode>, <code>turn-policy/turn-policy-validation.ts<\u002Fcode>). No I/O.<\u002Ftd><td>nothing concrete<\u002Ftd><\u002Ftr><tr><td><code>partner-ai-core/src/ports/<\u002Fcode><\u002Ftd><td>Port<\u002Ftd><td>Interfaces describing what core needs (<code>ClockPort<\u002Fcode>, <code>AiRuntimePort<\u002Fcode>, <code>TurnGuardRegistryPort<\u002Fcode>).<\u002Ftd><td>domain types only<\u002Ftd><\u002Ftr><tr><td><code>partner-ai-core/src/application/<\u002Fcode><\u002Ftd><td>Use case<\u002Ftd><td>Orchestration in Effect (<code>stream-chat<\u002Fcode>, turn pipeline, protocol stream).<\u002Ftd><td>domain + ports<\u002Ftd><\u002Ftr><tr><td><code>partner-ai-service/src/adapters/<\u002Fcode><\u002Ftd><td>Adapter<\u002Ftd><td>Concrete implementations of ports (Jira tool, noop guards, OpenAI).<\u002Ftd><td>external libs<\u002Ftd><\u002Ftr><tr><td><code>partner-ai-service/src/composition/<\u002Fcode><\u002Ftd><td>Composition<\u002Ftd><td>Registries, factories, the composition root. The only place that calls <code>new<\u002Fcode>.<\u002Ftd><td>everything<\u002Ftd><\u002Ftr><tr><td><code>partner-ai-service/src/inbound/http/<\u002Fcode><\u002Ftd><td>Protocol/HTTP<\u002Ftd><td>Routes, middleware, SSE framing.<\u002Ftd><td>composition output<\u002Ftd><\u002Ftr><tr><td><code>side-chat-widget/<\u002Fcode>, <code>chat-client/<\u002Fcode><\u002Ftd><td>UI / transport<\u002Ftd><td>React hooks, message state, the SSE read loop.<\u002Ftd><td>protocol contract<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<p>The dependency rule that makes this hold: <strong>arrows point inward, toward <code>domain<\u002Fcode>.<\u002Fstrong> Core never imports an adapter; an adapter never imports a route; composition imports everything and wires it together. If you ever find a <code>domain/<\u002Fcode> file importing <code>@ai-sdk/openai<\u002Fcode>, that is a bug, not a pattern.<\u002Fp>\n<p>One path gotcha to internalize now: tests sit one directory <em>above<\u002Fem> the implementation they cover for turn-policy validation. The test is <code>domain/capabilities/turn-policy-validation.test.ts<\u002Fcode>, but the code under test is <code>domain/capabilities/turn-policy/turn-policy-validation.ts<\u002Fcode> (note the extra <code>turn-policy/<\u002Fcode> segment). If you infer the impl path from the test path, you will be one directory off — go into the nested folder.<\u002Fp>\n<h3 id=\"84-honest-current-vs-target-gaps\">8.4 Honest current-vs-target gaps<\u002Fh3>\n<p>A few things are deliberately rough in this RC phase. Knowing them saves you a confused afternoon.<\u002Fp>\n<ul><li><strong>The protocol state machine is informal.<\u002Fstrong> There is no <code>ProtocolStateMachine<\u002Fcode> class. The valid event ordering (started → delta* / activity* → exactly one terminal, last) lives as runtime checks in <code>packages/partner-ai-core/src/application/stream-chat/protocol/protocol-event-accumulator.ts<\u002Fcode> on the server and mirrored in <code>validateIncrementalEvent<\u002Fcode> in <code>packages/chat-client/src/transport/sse-reader.ts<\u002Fcode> on the client. The rules are real and enforced; they are just expressed as accumulator logic, not a declared diagram.<\u002Fli><li><strong>No <code>sidechat.blocked<\u002Fcode> event exists yet.<\u002Fstrong> When a turn guard or content filter rejects input, it surfaces as a <code>sidechat.error<\u002Fcode> (or a pre-stream JSON error if it fires before <code>sidechat.started<\u002Fcode>). The UI cannot today distinguish \"blocked by safety policy\" from \"the provider failed\" — both are errors. A dedicated terminal event is target, not current.<\u002Fli><li><strong>Guards are a noop by default.<\u002Fstrong> <code>createNoopTurnGuardRegistry<\u002Fcode> returns <code>{ guards: [] }<\u002Fcode>, so the RC deployment does no pre-model content safety checking unless a real registry is injected at the composition root. This is not an accident — the file comment in <code>apps/partner-ai-service/src/adapters/guards/noop-turn-guard-registry.ts<\u002Fcode> states it outright:<\u002Fli><\u002Ful>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// Local/test fallback used when no guard registry is injected. Real deployments\n// should provide the guards that must run before model, tools, or private context.\nexport const createNoopTurnGuardRegistry = (): TurnGuardRegistryPort =&gt; ({ guards: [] });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>  Because <code>guards<\u002Fcode> is <code>[]<\u002Fcode>, the guard loop in core iterates zero times and every turn is allowed through.<\u002Fp>\n<p>One note where the live code is <em>ahead<\u002Fem> of older docs you may run into: the context board is no longer labeled \"Trusted context board:\". <code>render-context-board-message.ts<\u002Fcode> now renders a <code># Context Board<\u002Fcode> header plus a fixed boundary paragraph and stamps <code>Trust:<\u002Fcode>/<code>Source:<\u002Fcode> provenance on every section — so trust labeling is largely in place, not \"partial.\" If you see the old wording anywhere, it is stale.<\u002Fp>\n<h3 id=\"85-where-the-tests-live-and-what-they-pin\">8.5 Where the tests live and what they pin<\u002Fh3>\n<p>Tests sit next to the code they cover (<code>*.test.ts<\u002Fcode>). The ones worth knowing:<\u002Fp>\n<ul><li><strong>Protocol framing<\u002Fstrong> — <code>packages/chat-protocol/src/sidechat-v1/codec/sse-codec.test.ts<\u002Fcode> has exactly two cases. One round-trips a typed event through <code>encodeSseEvent<\u002Fcode>/<code>decodeSseEvents<\u002Fcode>. The other pins that the SSE frame's <code>event:<\u002Fcode> line must match the event <code>type<\u002Fcode> inside the JSON payload: the test takes a valid <code>sidechat.completed<\u002Fcode> frame, swaps its <code>event: sidechat.completed<\u002Fcode> line for <code>event: text-delta<\u002Fcode>, and asserts <code>decodeSseEvents<\u002Fcode> throws <code>ProtocolValidationError<\u002Fcode>. So a frame whose header name disagrees with its payload type is rejected at decode time. (The test does not assert anything about the <code>id:<\u002Fcode> line — do not go looking for an <code>id<\u002Fcode>/payload cross-check here.)<\u002Fli><li><strong>Message assembly order<\u002Fstrong> — <code>build-model-turn-request.test.ts<\u002Fcode> and <code>render-context-board-message.test.ts<\u002Fcode> pin the deterministic message order and the exact context-boundary wording. The boundary paragraph is a security contract; if you reword it, this test fails on purpose.<\u002Fli><li><strong>Turn-policy validation<\u002Fstrong> — <code>packages/partner-ai-core/src/domain/capabilities/turn-policy-validation.test.ts<\u002Fcode> pins that a turn policy cannot allow a tool outside the resolved profile/manifest. The cited case starts from a valid decision, then injects <code>\"missing_tool\"<\u002Fcode> into <code>allowedToolNames<\u002Fcode>, and asserts the validator returns <code>UNKNOWN_TOOL_REFERENCE<\u002Fcode> for it. (The implementation it exercises lives one level down, in <code>turn-policy/turn-policy-validation.ts<\u002Fcode>.)<\u002Fli><li><strong>The whole pipeline<\u002Fstrong> — <code>packages/partner-ai-core/src/application/stream-chat/stream-chat.test.ts<\u002Fcode> and <code>stream-chat-guards.test.ts<\u002Fcode> pin the pre-start ordering, the guard fail-closed behavior, and that failures before <code>sidechat.started<\u002Fcode> never open an SSE body.<\u002Fli><li><strong>Registry validation<\u002Fstrong> — the factory tests under <code>apps/partner-ai-service/src/composition/factories/<\u002Fcode> (e.g. <code>create-service-assistant-bundle.test.ts<\u002Fcode>) pin that bad declarations throw at boot, not at request time.<\u002Fli><\u002Ful>\n<p>Rule of thumb: if you change a wire shape, a message order, or an allowlist rule, a test above will catch you — start your change by reading its test, then the code.<\u002Fp>\n<hr>\n<p>For the deeper \"why\" behind any term used here, see <strong>Section 6 (the confusing words)<\u002Fstrong> and the <strong>Section 9 glossary<\u002Fstrong>; for the full request trace, see <strong>Section 5 (Life of a turn)<\u002Fstrong>.<\u002Fp>\n<hr>\n<h2 id=\"9-glossary-quick-reference\">9. Glossary: Quick Reference<\u002Fh2>\n<p>One line each. When a term is taught in depth elsewhere, the section is noted. \"In the code\" points at the real thing so you can grep for it.<\u002Fp>\n<h3 id=\"ai-llm-words-section-2\">AI / LLM words (<a href=\"#2-the-vocabulary-of-ai-agents-with-examples\">section 2<\u002Fa>)<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>Term<\u002Fth><th>One-line meaning<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>LLM<\u002Fstrong><\u002Ftd><td>A stateless HTTP text-predictor. It remembers nothing between calls, so the server resends the whole transcript every turn.<\u002Ftd><\u002Ftr><tr><td><strong>Token<\u002Fstrong><\u002Ftd><td>The chunk of text an LLM counts (~¾ of a word). You pay per token and every model has a hard limit.<\u002Ftd><\u002Ftr><tr><td><strong>Context window<\u002Fstrong><\u002Ftd><td>The maximum tokens (history + new message + reply) a model accepts in one call.<\u002Ftd><\u002Ftr><tr><td><strong>Prompt<\u002Fstrong><\u002Ftd><td>The text you send the model — in practice a <em>list of messages<\u002Fem>, each tagged with a role.<\u002Ftd><\u002Ftr><tr><td><strong>Role<\u002Fstrong><\u002Ftd><td><code>system<\u002Fcode> (server's standing rules), <code>user<\u002Fcode> (the human), <code>assistant<\u002Fcode> (the model's past replies). The browser may set <strong>none<\u002Fstrong> of them.<\u002Ftd><\u002Ftr><tr><td><strong>Streaming / delta<\u002Fstrong><\u002Ftd><td>Pushing the reply fragment-by-fragment as it's generated; each fragment is a <code>delta<\u002Fcode>. The UI concatenates them.<\u002Ftd><\u002Ftr><tr><td><strong>SSE<\u002Fstrong><\u002Ftd><td>Server-Sent Events — a one-way HTTP stream (server → browser) carrying the deltas and activities.<\u002Ftd><\u002Ftr><tr><td><strong>Tool / function-calling<\u002Fstrong><\u002Ftd><td>A function you let the model <em>request<\u002Fem>. The model can't act — it asks, your code runs it, you feed the result back.<\u002Ftd><\u002Ftr><tr><td><strong>Tool loop<\u002Fstrong><\u002Ftd><td>model asks → your code runs the tool → result fed back → model continues, repeating until it can answer.<\u002Ftd><\u002Ftr><tr><td><strong>Provider vs model<\u002Fstrong><\u002Ftd><td>Provider = the API you call. Here only <strong>OpenAI<\u002Fstrong> is real (plus a <code>fake<\u002Fcode> test provider). Model = an id like <code>gpt-5.4-mini<\u002Fcode>.<\u002Ftd><\u002Ftr><tr><td><strong>Reasoning<\u002Fstrong><\u002Ftd><td>\"Thinking\" tokens a model spends privately before answering; hidden from the user by default here.<\u002Ftd><\u002Ftr><tr><td><strong>Agentic<\u002Fstrong><\u002Ftd><td>The system can take actions (call tools), observe results, and loop — not just reply once.<\u002Ftd><\u002Ftr><tr><td><strong>Turn<\u002Fstrong><\u002Ftd><td>One user message in → one full assistant response out (including any tool loops). Recorded as one <code>assistant_turn<\u002Fcode> row.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<h3 id=\"architecture-pattern-words-section-3\">Architecture &amp; pattern words (<a href=\"#3-the-patterns-and-how-they-are-actually-built\">section 3<\u002Fa>)<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>Term<\u002Fth><th>One-line meaning<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>Port<\u002Fstrong><\u002Ftd><td>An interface the Core <em>needs<\u002Fem> but doesn't implement (<code>ClockPort<\u002Fcode>, <code>AiRuntimePort<\u002Fcode>).<\u002Ftd><\u002Ftr><tr><td><strong>Adapter<\u002Fstrong><\u002Ftd><td>A concrete object that <em>fulfills<\u002Fem> a port using a real library (OpenAI, Postgres, HTTP).<\u002Ftd><\u002Ftr><tr><td><strong>Dependency inversion<\u002Fstrong><\u002Ftd><td>Infrastructure depends on an interface the Core owns — not the other way around.<\u002Ftd><\u002Ftr><tr><td><strong>Composition root<\u002Fstrong><\u002Ftd><td>The one function (<code>composePartnerAiService<\u002Fcode>) that picks real adapters and wires them into the ports at startup.<\u002Ftd><\u002Ftr><tr><td><strong>Dependency injection<\u002Fstrong><\u002Ftd><td>Passing a function what it needs as arguments instead of letting it reach for a global.<\u002Ftd><\u002Ftr><tr><td><strong>Factory<\u002Fstrong><\u002Ftd><td>A <code>create*<\u002Fcode> function that turns typed config into one finished, validated <strong>bundle<\u002Fstrong> (e.g. <code>createServiceToolBundle<\u002Fcode>).<\u002Ftd><\u002Ftr><tr><td><strong>Strategy<\u002Fstrong><\u002Ftd><td>A swappable behavior expressed as a function-shaped type and injected (the <code>SystemPromptBuilder<\u002Fcode>, title generation, policy).<\u002Ftd><\u002Ftr><tr><td><strong>Registry<\u002Fstrong><\u002Ftd><td>A boot-time validator that checks declarations and returns a frozen, name-indexed collection; fails loud on a bad name.<\u002Ftd><\u002Ftr><tr><td><strong>State machine<\u002Fstrong><\u002Ftd><td>Modeling the stream as allowed states/transitions so a wrong sequence is impossible. Here it's enforced informally in <code>protocol-event-accumulator.ts<\u002Fcode>.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<h3 id=\"this-codebase-nouns-section-6-section-7\">This-codebase nouns (<a href=\"#6-the-confusing-words-concept-then-implementation\">section 6<\u002Fa> · <a href=\"#7-hands-on-add-a-search-jira-tool-end-to-end\">section 7<\u002Fa>)<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>Term<\u002Fth><th>One-line meaning<\u002Fth><th>In the code<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>Manifest<\u002Fstrong><\u002Ftd><td>A deployment's declared <em>menu<\u002Fem> of profiles/tools/commands. Data only — no executables, no secrets. Hashed per turn.<\u002Ftd><td><code>HostCapabilityManifest<\u002Fcode> in <code>domain/capabilities/contracts/capabilities.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Capability<\u002Fstrong><\u002Ftd><td>One declared entry in the manifest — the <em>description the model sees<\u002Fem>, never the running code.<\u002Ftd><td><code>ToolCapability = { name, description, inputSchema }<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Registry<\u002Fstrong><\u002Ftd><td>The boot-time object holding the real executables behind the manifest's declarations.<\u002Ftd><td><code>createServiceToolRegistry<\u002Fcode> in <code>composition/tools/service-tool-registry.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Turn policy decision<\u002Fstrong><\u002Ftd><td>The closed allowlist for <em>one<\u002Fem> turn: model, profile, <code>allowedToolNames<\u002Fcode>, system instructions + manifest hash.<\u002Ftd><td><code>TurnPolicyDecision<\u002Fcode>; built in <code>turn/turn-policy-plan.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Assistant profile<\u002Fstrong><\u002Ftd><td>A named persona: system prompt + model + allowed tools + safety. Exactly one is active per turn (default: <code>default<\u002Fcode>).<\u002Ftd><td><code>AssistantProfile<\u002Fcode>; <code>assistant/assistant-profile-registry.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Context candidate<\u002Fstrong><\u002Ftd><td>A <em>proposed<\u002Fem> piece of background (history, page info) that must survive a token budget before the model sees it.<\u002Ftd><td><code>ContextCandidate<\u002Fcode> in <code>domain/capabilities/contracts/context.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Context board<\u002Fstrong><\u002Ftd><td>The admitted context, rendered as one <code>system<\u002Fcode> message under a \"not instructions\" boundary with <code>Trust:<\u002Fcode>/<code>Source:<\u002Fcode> tags.<\u002Ftd><td><code>render-context-board-message.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Policy<\u002Fstrong><\u002Ftd><td>A business-rule veto (quota, entitlement, model availability) — \"may this caller spend a model call now?\".<\u002Ftd><td><code>PolicyPort.evaluate<\u002Fcode> in <code>policies/policy.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Guard<\u002Fstrong><\u002Ftd><td>A pre-flight <em>safety<\u002Fem> veto on the raw user text, before any prompt/tools are assembled. Fails closed. (Noop by default in RC.)<\u002Ftd><td><code>TurnGuardInput<\u002Fcode>; <code>ports/guards/turn-guard.ts<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>Repository<\u002Fstrong><\u002Ftd><td>A port for reading/writing stored records, hiding the database behind named methods.<\u002Ftd><td><code>ConversationRepositoryPort<\u002Fcode>; memory + Postgres adapters in <code>packages/db<\u002Fcode><\u002Ftd><\u002Ftr><tr><td><strong>noop adapter<\u002Fstrong><\u002Ftd><td>An adapter that satisfies a required port by doing nothing on purpose — a dev/RC placeholder.<\u002Ftd><td><code>createNoopTurnGuardRegistry<\u002Fcode> → <code>{ guards: [] }<\u002Fcode><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<h3 id=\"transport-storage-ui-words-section-4\">Transport, storage &amp; UI words (<a href=\"#4-the-map-every-package-and-its-one-job\">section 4<\u002Fa>)<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>Term<\u002Fth><th>One-line meaning<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>Host bridge<\u002Fstrong><\u002Ftd><td>The seam that lets the widget ask the page it's embedded in to run an allowed command.<\u002Ftd><\u002Ftr><tr><td><strong>Drizzle<\u002Fstrong><\u002Ftd><td>The TypeScript query-builder/ORM the Postgres repository uses.<\u002Ftd><\u002Ftr><tr><td><strong>Migration<\u002Fstrong><\u002Ftd><td>A versioned SQL change file that evolves the database schema.<\u002Ftd><\u002Ftr><tr><td><strong>FSD (feature-sliced design)<\u002Fstrong><\u002Ftd><td>The widget's folder convention: <code>shared<\u002Fcode> → <code>entities<\u002Fcode> → <code>features<\u002Fcode> → <code>widgets<\u002Fcode>, lower layers never importing up.<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<h3 id=\"typescript-library-gotchas\">TypeScript / library gotchas<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>Term<\u002Fth><th>One-line meaning<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>Effect<\u002Fstrong><\u002Ftd><td>The async library used instead of <code>Promise<\u002Fcode>. <code>Effect.Effect&lt;A, E&gt;<\u002Fcode> = a lazy Promise of <code>A<\u002Fcode> that fails with typed <code>E<\u002Fcode>.<\u002Ftd><\u002Ftr><tr><td><strong>Stream<\u002Fstrong><\u002Ftd><td>Effect's streaming type. <code>Stream.Stream&lt;A, E&gt;<\u002Fcode> = a sequence of <code>A<\u002Fcode>s that may fail with <code>E<\u002Fcode> (the protocol event stream).<\u002Ftd><\u002Ftr><tr><td><strong>Branded type<\u002Fstrong><\u002Ftd><td><code>Brand&lt;string, \"RequestId\"&gt;<\u002Fcode> — a plain string at runtime, with a compile-time label so IDs can't be mixed up.<\u002Ftd><\u002Ftr><tr><td><strong>Terminal event<\u002Fstrong><\u002Ftd><td>The one event that closes a stream: <code>sidechat.completed<\u002Fcode> or <code>sidechat.error<\u002Fcode>. Nothing may follow it.<\u002Ftd><\u002Ftr><tr><td><strong>Finish reason<\u002Fstrong><\u002Ftd><td>Why a completed turn ended: <code>stop<\u002Fcode> (normal), <code>length<\u002Fcode> (hit token limit), <code>aborted<\u002Fcode> (cancelled).<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<hr>\n<p><em>This guide was generated by reading the repository's source together with the <code>sidechat-complete-architecture/<\u002Fcode> spec. The project is moving through its RC phases, so the \"current vs target\" notes in <a href=\"#8-how-to-navigate-this-codebase\">section 8<\u002Fa> are the most likely to drift — re-check them against the code before relying on them.<\u002Fem><\u002Fp>\n<\u002Fdiv><\u002Fmain>\n<\u002Fdiv>\n<script>\n(function(){\n  var heads=[].slice.call(document.querySelectorAll('main h2'));\n  var sections=heads.filter(function(h){return /^\\d+\\./.test(h.textContent.trim());});\n  var navs=document.querySelectorAll('[data-toc]');\n  sections.forEach(function(h){\n    var m=h.textContent.trim().match(/^(\\d+)\\.\\s*(.*)$/);\n    var num=m?m[1]:'';var title=(m?m[2]:h.textContent).replace(/\\s*\\(with examples\\)/,'');\n    navs.forEach(function(nav){var a=document.createElement('a');a.href='#'+h.id;a.className='toc-link';a.setAttribute('data-target',h.id);a.innerHTML='<span class=\"toc-num\">'+num+'<\u002Fspan><span class=\"toc-text\">'+title+'<\u002Fspan>';nav.appendChild(a);});\n  });\n  var links=[].slice.call(document.querySelectorAll('.toc-link'));\n  function setActive(id){links.forEach(function(l){l.classList.toggle('active',l.getAttribute('data-target')===id);});}\n  var vis={};\n  var obs=new IntersectionObserver(function(entries){\n    entries.forEach(function(e){vis[e.target.id]=e.isIntersecting;});\n    for(var k=0;k<sections.length;k++){if(vis[sections[k].id]){setActive(sections[k].id);break;}}\n  },{rootMargin:'-8% 0px -82% 0px',threshold:0});\n  sections.forEach(function(h){obs.observe(h);});\n\n  var bar=document.getElementById('progress');\n  function onScroll(){var st=window.scrollY||document.documentElement.scrollTop;var h=document.documentElement.scrollHeight-window.innerHeight;bar.style.width=(h>0?(st/h*100):0)+'%';}\n  window.addEventListener('scroll',onScroll,{passive:true});onScroll();\n\n  var btn=document.getElementById('menu-btn'),scrim=document.getElementById('scrim');\n  function close(){document.body.classList.remove('drawer-open');}\n  if(btn)btn.addEventListener('click',function(){document.body.classList.toggle('drawer-open');});\n  if(scrim)scrim.addEventListener('click',close);\n  var dr=document.getElementById('drawer');if(dr)dr.addEventListener('click',function(e){if(e.target.closest('.toc-link'))close();});\n\n  // heading anchor links\n  ['h2','h3','h4'].forEach(function(t){[].slice.call(document.querySelectorAll('main '+t+'[id]')).forEach(function(h){var a=document.createElement('a');a.className='anchor';a.href='#'+h.id;a.textContent='#';a.setAttribute('aria-label','link');h.appendChild(a);});});\n\n  // copy buttons\n  [].slice.call(document.querySelectorAll('.codeblock')).forEach(function(fig){\n    var b=document.createElement('button');b.className='copy-btn';b.type='button';b.textContent='Copy';\n    b.addEventListener('click',function(){\n      var txt=fig.querySelector('code').innerText;\n      function ok(){b.textContent='Copied';b.classList.add('done');setTimeout(function(){b.textContent='Copy';b.classList.remove('done');},1400);}\n      try{navigator.clipboard.writeText(txt).then(ok,function(){fb();});}catch(e){fb();}\n      function fb(){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');ok();}catch(e){}document.body.removeChild(ta);}\n    });\n    fig.appendChild(b);\n  });\n\n  // ===== turn tracer =====\n  var mount=document.getElementById('turn-tracer');\n  if(mount){\n    var HOPS=[\n      {n:'00',name:'HTTP route parse',where:'Edge (Hono)',what:'Validate body, brand IDs, build <span class=\"mc\">StreamChatInput<\u002Fspan>',lanes:['service'],ph:'pre'},\n      {n:'01',name:'Authority check',where:'Core',what:'Maya may act in this workspace?',lanes:['core'],ph:'pre'},\n      {n:'02',name:'Request scope',where:'Core',what:'Stamp <span class=\"mc\">requestId<\u002Fspan>/<span class=\"mc\">traceId<\u002Fspan>, capture <span class=\"mc\">startedAt<\u002Fspan>',lanes:['core'],ph:'pre'},\n      {n:'03',name:'Observe received',where:'Core',what:'First lifecycle record',lanes:['core'],ph:'pre'},\n      {n:'04',name:'Resolve turn plan',where:'Core',what:'Manifest + profile → <span class=\"mc\">TurnPolicyDecision<\u002Fspan> (allowlist)',lanes:['core'],ph:'pre'},\n      {n:'05',name:'Run turn guards',where:'Core',what:'Safety checks on raw text, before context exists',lanes:['core'],ph:'pre'},\n      {n:'06',name:'Ensure conversation',where:'Core → DB',what:'Upsert + re-check ownership',lanes:['core','db'],ph:'pre'},\n      {n:'07',name:'Append user message',where:'Core → DB',what:'Persist Maya’s text as <span class=\"mc\">role: user<\u002Fspan>',lanes:['core','db'],ph:'pre'},\n      {n:'08',name:'Start assistant turn',where:'Core → DB',what:'Open <span class=\"mc\">running<\u002Fspan> turn row',lanes:['core','db'],ph:'pre'},\n      {n:'09',name:'Prepare context',where:'Core',what:'History + page context → model-ready messages',lanes:['core'],ph:'pre'},\n      {n:'10',name:'Observe started',where:'Core',what:'Pre-start done; <span class=\"mc\">PreparedStreamChatTurn<\u002Fspan> returned',lanes:['core'],ph:'pre'},\n      {n:'11',name:'Build model request',where:'Core',what:'Assemble <span class=\"mc\">AiRuntimeRequest<\u002Fspan> (names only)',lanes:['core'],ph:'str'},\n      {n:'12',name:'Runtime + tool loop',where:'Runtime',what:'Model calls <span class=\"mc\">jira.search_issues<\u002Fspan>; activity rows',lanes:['runtime'],ph:'str'},\n      {n:'13',name:'Runtime → protocol map',where:'Core',what:'<span class=\"mc\">RuntimeEvent<\u002Fspan> → <span class=\"mc\">sidechat.*<\u002Fspan> events',lanes:['core'],ph:'str'},\n      {n:'14',name:'SSE wire + client decode',where:'Edge → Browser',what:'Frame, flush, validate sequence',lanes:['service','browser'],ph:'str'},\n      {n:'15',name:'Finalize + persist',where:'Core → DB',what:'Mark turn <span class=\"mc\">completed<\u002Fspan>, store the answer',lanes:['core','db'],ph:'str'}\n    ];\n    var FRAMES=[\n      {seq:0,ev:'sidechat.started',tx:'stream opens',at:11},\n      {seq:1,ev:'sidechat.activity',tx:'running · Searching Jira',at:12},\n      {seq:2,ev:'sidechat.activity',tx:'completed · 2 results + sources',at:13},\n      {seq:3,ev:'sidechat.delta',tx:'\"Here are your 2 open tickets:\"',at:14},\n      {seq:4,ev:'sidechat.completed',tx:'usage in 312 · out 48 · total 360',at:15}\n    ];\n    var ANSWER='Here are your 2 open tickets:';\n    var LANES=[['browser','Browser','side-chat-widget'],['service','Service','partner-ai-service'],['core','Core','partner-ai-core'],['runtime','Runtime','agent-runtime']];\n    var html='<div class=\"trace\">'\n      +'<div class=\"trace-head\"><div class=\"trace-title\">Trace Maya’s turn<\u002Fdiv><div class=\"trace-sub\">one message · 16 hops · two phases<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"trace-lanes\">'+LANES.map(function(l){return '<div class=\"lane\" data-lane=\"'+l[0]+'\"><div class=\"ln\">'+l[1]+'<\u002Fdiv><div class=\"ld\">'+l[2]+'<\u002Fdiv><\u002Fdiv>';}).join('')+'<\u002Fdiv>'\n      +'<div class=\"trace-phase\"><span class=\"ph pre\">Pre-start<\u002Fspan><span class=\"ph-div\">▸ first byte ▸<\u002Fspan><span class=\"ph str\">Streaming<\u002Fspan><\u002Fdiv>'\n      +'<div class=\"trace-stage\"><div class=\"stage-top\"><div class=\"hopnum\"><\u002Fdiv><div class=\"hopmeta\"><div class=\"hopname\"><\u002Fdiv><div class=\"hopwhere\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"hopwhat\"><\u002Fdiv>'\n      +'<div class=\"trace-extra\"><div class=\"sse\">'+FRAMES.map(function(f){return '<div class=\"fr\" data-at=\"'+f.at+'\"><span class=\"sq\">'+f.seq+'<\u002Fspan><span class=\"ev\">'+f.ev+'<\u002Fspan><span class=\"tx\">'+f.tx+'<\u002Fspan><\u002Fdiv>';}).join('')+'<\u002Fdiv>'\n      +'<div class=\"chat\"><div class=\"act\"><span class=\"dot\"><\u002Fspan><span class=\"act-label\">Searching Jira…<\u002Fspan><span class=\"src\"><\u002Fspan><\u002Fdiv><div class=\"ans\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>'\n      +'<\u002Fdiv>'\n      +'<div class=\"trace-dots\">'+HOPS.map(function(h,k){return '<button class=\"tdot\" data-i=\"'+k+'\">'+(k)+'<\u002Fbutton>';}).join('')+'<\u002Fdiv>'\n      +'<div class=\"trace-ctrl\"><button class=\"tbtn prev\">← Prev<\u002Fbutton><button class=\"tbtn play\">▶ Play<\u002Fbutton><button class=\"tbtn next\">Next →<\u002Fbutton><\u002Fdiv>'\n      +'<\u002Fdiv>';\n    mount.innerHTML=html;\n    var root=mount.querySelector('.trace');\n    var elNum=root.querySelector('.hopnum'),elName=root.querySelector('.hopname'),elWhere=root.querySelector('.hopwhere'),elWhat=root.querySelector('.hopwhat');\n    var extra=root.querySelector('.trace-extra'),lanes=root.querySelectorAll('.lane'),dots=root.querySelectorAll('.tdot');\n    var phPre=root.querySelector('.ph.pre'),phStr=root.querySelector('.ph.str');\n    var actEl=root.querySelector('.act'),actLabel=root.querySelector('.act-label'),srcEl=root.querySelector('.src'),ansEl=root.querySelector('.ans');\n    var frames=root.querySelectorAll('.sse .fr');\n    var idx=0,playing=false,timer=null;\n    function render(){\n      var h=HOPS[idx];\n      elNum.textContent=h.n;elName.textContent=h.name;elWhere.textContent=h.where;elWhat.innerHTML=h.what;\n      lanes.forEach(function(l){l.classList.toggle('on',h.lanes.indexOf(l.getAttribute('data-lane'))>=0);});\n      phPre.classList.toggle('on',h.ph==='pre');phStr.classList.toggle('on',h.ph==='str');\n      dots.forEach(function(d,k){d.classList.toggle('on',k===idx);d.classList.toggle('passed',k<idx);});\n      var streaming=idx>=11;extra.classList.toggle('show',streaming);\n      frames.forEach(function(f){f.classList.toggle('in',idx>=(+f.getAttribute('data-at')));});\n      // chat\n      if(idx>=12){actEl.style.display='flex';}else{actEl.style.display='none';}\n      if(idx>=13){actEl.classList.add('done');actLabel.textContent='Searched Jira (2 results)';srcEl.textContent='SC-42 · SC-41';}\n      else{actEl.classList.remove('done');actLabel.textContent='Searching Jira…';srcEl.textContent='';}\n      if(idx>=14){\n        var full=ANSWER;var frac=idx>=15?1:0.62;var len=idx>=15?full.length:Math.round(full.length*frac);\n        ansEl.innerHTML=full.slice(0,len)+(idx<15?'<span class=\"cur\"><\u002Fspan>':' <span class=\"done-badge\">completed<\u002Fspan>');\n      } else { ansEl.innerHTML=''; }\n      root.querySelector('.prev').disabled=(idx===0);root.querySelector('.next').disabled=(idx===HOPS.length-1);\n    }\n    function go(i){idx=Math.max(0,Math.min(HOPS.length-1,i));render();}\n    root.querySelector('.prev').addEventListener('click',function(){stop();go(idx-1);});\n    root.querySelector('.next').addEventListener('click',function(){stop();go(idx+1);});\n    dots.forEach(function(d){d.addEventListener('click',function(){stop();go(+d.getAttribute('data-i'));});});\n    var playBtn=root.querySelector('.play');\n    function stop(){playing=false;if(timer){clearInterval(timer);timer=null;}playBtn.innerHTML='▶ Play';}\n    function play(){\n      if(idx>=HOPS.length-1)idx=-1;\n      playing=true;playBtn.innerHTML='❚❚ Pause';\n      timer=setInterval(function(){if(idx>=HOPS.length-1){stop();return;}go(idx+1);},1100);\n    }\n    playBtn.addEventListener('click',function(){playing?stop():play();});\n    render();\n  }\n})();\n<\u002Fscript>\n<script>\n/* ===== glossary on hover ===== */\n(function(){\n  var G={\n    llm:{t:'LLM',s:2,d:`A large language model: a stateless function that takes a list of role-tagged messages in and predicts text out. It remembers nothing between calls, so the server resends the whole conversation every turn.`},\n    token:{t:'Token',s:2,d:`The word-fragments a model actually reads. Everything in one call — instructions, history, the question, tool descriptions — competes for a fixed token budget.`},\n    'context window':{t:'Context window',s:2,d:`The maximum number of tokens a model can take in one call. Context preparation decides what fits and what gets dropped.`},\n    prompt:{t:'Prompt',s:2,d:`Not one string but a list of role-tagged messages. The server owns most of it; the browser supplies only the user's text.`},\n    role:{t:'Role',s:2,d:`The label on each message — <code>system<\u002Fcode>, <code>user<\u002Fcode>, or <code>assistant<\u002Fcode>. The browser never sets it; the server assigns <code>user<\u002Fcode> to the human's text and writes <code>system<\u002Fcode> itself.`},\n    delta:{t:'Delta',s:2,d:`One small fragment of the answer, streamed as the model produces it instead of waiting for the whole reply.`},\n    sse:{t:'SSE',s:2,d:`Server-Sent Events: a one-way stream of text frames over a single HTTP response. Each frame is one event.`},\n    streaming:{t:'Streaming',s:2,d:`Sending the reply in pieces (deltas) as the model writes it, rather than all at once at the end.`},\n    tool:{t:'Tool',s:2,d:`A capability the model can <em>request<\u002Fem> but never run itself — it emits a call like <code>jira.search_issues(...)<\u002Fcode>; your runtime executes it and hands the result back.`},\n    'tool loop':{t:'Tool loop',s:2,d:`The back-and-forth where the model asks for a tool, the runtime runs it, and the result feeds back in for the model's next step.`},\n    activity:{t:'Activity',s:2,d:`A UI row surfacing a tool call's progress — <em>Searching Jira<\u002Fem> → <em>Searched Jira (2 results)<\u002Fem> — updated in place by its <code>activityId<\u002Fcode>.`},\n    provider:{t:'Provider',s:2,d:`The company or API you call (here, <code>openai<\u002Fcode>). One provider offers many models.`},\n    model:{t:'Model',s:2,d:`One specific brain a provider offers, e.g. <code>gpt-5.4-mini<\u002Fcode>. The server decides which model a turn may use — never the browser.`},\n    agentic:{t:'Agentic',s:2,d:`When the system can take actions, observe results, and decide what to do next — looping until the task is done — not just chat.`},\n    manifest:{t:'Manifest',s:6,d:`The printed menu: a serializable list of what profiles, tools, and commands exist — names, descriptions, schemas. No executables, no secrets.`},\n    registry:{t:'Registry',s:6,d:`The stocked kitchen: a boot-time object that validates declarations and holds the real executables and secrets behind them.`},\n    profile:{t:'Profile',s:2,d:`An assistant profile — a named bundle of who the assistant is for a turn: its system instructions, its model, and its allowlist of tools.`},\n    port:{t:'Port',s:3,d:`A job description expressed as a TypeScript type: what core needs from the outside world, with no idea who provides it.`},\n    adapter:{t:'Adapter',s:3,d:`The worker that fulfils a port — a concrete implementation wrapping a vendor SDK, a database, or the clock.`},\n    'composition root':{t:'Composition root',s:3,d:`The single function (<code>composePartnerAiService<\u002Fcode>) where every real implementation is created and wired together.`},\n    factory:{t:'Factory',s:3,d:`A <code>create*<\u002Fcode> function that takes raw config, validates and wires it, and returns one named, typed bundle instead of loose parts.`},\n    effect:{t:'Effect',s:1,cs:1,d:`The library this codebase uses instead of <code>Promise<\u002Fcode>. Read <code>Effect&lt;A, E&gt;<\u002Fcode> as “a lazy, not-yet-run Promise of <code>A<\u002Fcode> that can fail with the typed error <code>E<\u002Fcode>.”`},\n    'branded type':{t:'Branded type',s:1,d:`A string the compiler is being careful about: <code>RequestId<\u002Fcode> is just a string at runtime, with a compile-time label so you can't pass it where a <code>ConversationId<\u002Fcode> belongs.`},\n    'trust boundary':{t:'Trust boundary',s:5,d:`The single line that splits a turn: fail before the first byte → a clean HTTP error; fail after → an error inside the already-open stream.`},\n    'context board':{t:'Context board',s:3,d:`The
