 block of reference data injected around the question (page URL, history), rendered under a fixed header telling the model it's data, not instructions.`},\n    'turn policy decision':{t:'Turn policy decision',s:6,d:`The order ticket for one turn: a flat copy of the chosen profile's fields plus the manifest hash — the closed allowlist of what this turn may use.`},\n    idor:{t:'IDOR',s:5,d:`Insecure direct object reference: reaching another user's data by guessing its id. Blocked here by re-checking ownership after the conversation upsert.`}\n  };\n  var secId={};\n  [].forEach.call(document.querySelectorAll('main h2[id]'),function(h){var m=h.textContent.trim().match(/^(\\d+)\\./);if(m)secId[m[1]]=h.id;});\n  function plural(w){return /[^aeiou]y$/.test(w)?w.slice(0,-1)+'ies':w+'s';}\n  var lookup={};\n  Object.keys(G).forEach(function(id){lookup[id]=id;lookup[plural(id)]=id;});\n  var forms=Object.keys(lookup).sort(function(a,b){return b.length-a.length;});\n  function rxesc(s){return s.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&');}\n  var RE=new RegExp('\\\\b(?:'+forms.map(rxesc).join('|')+')\\\\b','gi');\n  var SKIP='pre,a,h1,h2,h3,h4,h5,h6,.anchor,.dgm,.trace,.lang,.copy-btn,button,script,style,.gl-term';\n  var glossaryId=secId['9']||'';\n  function resolve(raw){var id=lookup[raw.toLowerCase()];if(!id)return null;var g=G[id];if(g.cs&&raw!==g.t)return null;return id;}\n  function wrapText(node,used){\n    var txt=node.nodeValue,m;RE.lastIndex=0;\n    while((m=RE.exec(txt))){\n      var raw=m[0],id=resolve(raw);\n      if(!id||used[id])continue;\n      var before=txt.slice(0,m.index),after=txt.slice(m.index+raw.length);\n      var span=document.createElement('span');span.className='gl-term';span.tabIndex=0;span.setAttribute('data-gid',id);span.textContent=raw;\n      var frag=document.createDocumentFragment();\n      if(before)frag.appendChild(document.createTextNode(before));\n      frag.appendChild(span);\n      var afterNode=after?document.createTextNode(after):null;\n      if(afterNode)frag.appendChild(afterNode);\n      node.parentNode.replaceChild(frag,node);\n      used[id]=1;\n      if(afterNode)wrapText(afterNode,used);\n      return;\n    }\n  }\n  function processSection(nodes,isGloss){\n    if(isGloss)return;\n    var used={};\n    nodes.forEach(function(root){\n      if(root.nodeType!==1)return;\n      var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(t){\n        if(!t.nodeValue||!t.nodeValue.trim())return NodeFilter.FILTER_REJECT;\n        if(t.parentNode&&t.parentNode.closest&&t.parentNode.closest(SKIP))return NodeFilter.FILTER_REJECT;\n        return NodeFilter.FILTER_ACCEPT;\n      }});\n      var batch=[],n;while((n=w.nextNode()))batch.push(n);\n      batch.forEach(function(t){\n        var p=t.parentNode;\n        if(p&&p.tagName==='CODE'){\n          var id=resolve((t.nodeValue||'').trim());\n          if(id&&!used[id]){p.classList.add('gl-term');p.setAttribute('data-gid',id);p.tabIndex=0;used[id]=1;}\n          return;\n        }\n        wrapText(t,used);\n      });\n    });\n  }\n  var col=document.querySelector('main .col');if(!col)return;\n  var group=[],curGloss=false;\n  function flush(){if(group.length)processSection(group,curGloss);group=[];}\n  [].forEach.call(col.children,function(ch){\n    if(ch.tagName==='H2'){flush();curGloss=(ch.id===glossaryId);return;}\n    group.push(ch);\n  });\n  flush();\n  var pop=document.createElement('div');pop.className='gl-pop';\n  pop.innerHTML='<div class=\"gl-pop-term\"><\u002Fdiv><div class=\"gl-pop-def\"><\u002Fdiv><a class=\"gl-pop-ref\"><\u002Fa>';\n  document.body.appendChild(pop);\n  var pT=pop.querySelector('.gl-pop-term'),pD=pop.querySelector('.gl-pop-def'),pR=pop.querySelector('.gl-pop-ref');\n  var hideT=null,anchor=null;\n  function openFor(el){\n    var id=el.getAttribute('data-gid'),g=G[id];if(!g)return;\n    anchor=el;pT.textContent=g.t;pD.innerHTML=g.d;\n    if(g.s&&secId[g.s]){pR.style.display='inline-block';pR.textContent='Explained in §'+g.s;pR.href='#'+secId[g.s];}else{pR.style.display='none';}\n    pop.classList.add('on');pos(el);\n  }\n  function pos(el){\n    pop.style.left='-9999px';pop.style.top='0px';\n    var r=el.getBoundingClientRect(),pw=pop.offsetWidth,ph=pop.offsetHeight;\n    var left=Math.max(10,Math.min(r.left+r.width/2-pw/2,window.innerWidth-pw-10));\n    var top=r.top-ph-10;if(top<10)top=r.bottom+10;\n    pop.style.left=left+'px';pop.style.top=top+'px';\n  }\n  function close(){pop.classList.remove('on');anchor=null;}\n  document.addEventListener('mouseover',function(e){var t=e.target.closest&&e.target.closest('.gl-term');if(t){clearTimeout(hideT);openFor(t);}});\n  document.addEventListener('mouseout',function(e){var t=e.target.closest&&e.target.closest('.gl-term');if(t)hideT=setTimeout(close,150);});\n  pop.addEventListener('mouseenter',function(){clearTimeout(hideT);});\n  pop.addEventListener('mouseleave',function(){hideT=setTimeout(close,150);});\n  document.addEventListener('focusin',function(e){var t=e.target.closest&&e.target.closest('.gl-term');if(t){clearTimeout(hideT);openFor(t);}});\n  document.addEventListener('focusout',function(e){var t=e.target.closest&&e.target.closest('.gl-term');if(t)hideT=setTimeout(close,150);});\n  document.addEventListener('click',function(e){\n    var t=e.target.closest&&e.target.closest('.gl-term');\n    if(t){if(pop.classList.contains('on')&&anchor===t)close();else{clearTimeout(hideT);openFor(t);}return;}\n    if(!(e.target.closest&&e.target.closest('.gl-pop')))close();\n  });\n  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});\n  window.addEventListener('scroll',close,{passive:true});\n  window.addEventListener('resize',close);\n  pR.addEventListener('click',close);\n})();\n/* ===== Architecture Explorer modal ===== */\n(function(){\n  var loaded=false;\n  window.openArchModal=function(){\n    var ov=document.getElementById('arch-overlay');\n    ov.classList.add('open');\n    document.body.style.overflow='hidden';\n    if(!loaded){\n      loaded=true;\n      var src=(window.__resources&&window.__resources.archExplorer)||'Architecture Explorer.html';\n      document.getElementById('arch-frame').src=src;\n    }\n  };\n  document.getElementById('arch-close').addEventListener('click',function(){\n    document.getElementById('arch-overlay').classList.remove('open');\n    document.body.style.overflow='';\n  });\n  document.addEventListener('keydown',function(e){\n    if(e.key==='Escape'){\n      document.getElementById('arch-overlay').classList.remove('open');\n      document.body.style.overflow='';\n    }\n  });\n})();\n<\u002Fscript>\n<div id=\"arch-overlay\">\n  <div id=\"arch-modal\">\n    <div id=\"arch-bar\">\n      <div class=\"ab\">Sidechat / Partner AI <small>Architecture Explorer<\u002Fsmall><\u002Fdiv>\n      <button id=\"arch-close\">✕ Close<\u002Fbutton>\n    <\u002Fdiv>\n    <iframe id=\"arch-frame\" title=\"Architecture Explorer\"><\u002Fiframe>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fbody><\u002Fhtml>"
