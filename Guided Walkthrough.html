imeRequest = {\n  // ...providerId, modelId, messages...\n  readonly toolNames: readonly string[];   // e.g. ['jira.search_issues']\n  readonly toolScope: AiToolScope;\n  readonly abortSignal?: AbortSignal | undefined;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So for Maya's turn, core hands the runtime <code>toolNames: ['jira.search_issues']<\u002Fcode> — a name, a description-free, execute-free label. No function, no API client, no schema. Core literally cannot run a tool; it has nothing to run.<\u002Fp>\n<p><strong>After the boundary<\u002Fstrong>, inside <code>agent-runtime<\u002Fcode>, that name is turned into a real function by the tool registry (next subsection). The clean little type that connects the two sides is also in this file:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// ai-runtime-contract/src/index.ts\nexport type AiRuntimePort = {\n  readonly streamEffect: (request: AiRuntimeRequest) =&gt; AiRuntimeEventStream;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That is the entire surface core knows about the runtime: one method, <code>streamEffect<\u002Fcode>, that takes the names-only request and returns a stream of <code>RuntimeEvent<\u002Fcode>s. Core calls <code>ports.runtime.streamEffect(request)<\u002Fcode> and gets back deltas and activity rows — it never imports <code>openai<\u002Fcode> or <code>@ai-sdk<\u002Fcode> to do it.<\u002Fp>\n<h4 id=\"partner-ai-core-the-policy-brain\"><code>partner-ai-core<\u002Fcode> — the policy brain<\u002Fh4>\n<p>Core decides what is <em>allowed<\u002Fem> and never touches a model or a database directly. Its folders map to its responsibilities:<\u002Fp>\n<ul><li><code>application/stream-chat/<\u002Fcode> is the turn pipeline — <code>prepareStreamChatTurn<\u002Fcode> (the pre-flight checklist) and <code>createProtocolEventStream<\u002Fcode> (the live stream).<\u002Fli><li><code>domain/capabilities/<\u002Fcode> holds the manifest and the <code>TurnPolicyDecision<\u002Fcode> logic.<\u002Fli><li><code>ports/<\u002Fcode> is core's wish-list of things it needs from the outside world, expressed as interfaces it does not implement.<\u002Fli><\u002Ful>\n<p>The discipline that makes core <em>core<\u002Fem>: nothing in here imports <code>openai<\u002Fcode>, <code>@ai-sdk<\u002Fcode>, or a Postgres driver. Instead it asks for those things by type. A port is small — often just one method. The clock is the clearest example of how thin a port really is:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// ports/lifecycle/clock.ts\nexport type ClockPort = {\n  readonly now: () =&gt; string;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>That is the <em>entire<\u002Fem> thing core knows about time. It never calls <code>new Date()<\u002Fcode>. The service passes a real adapter (<code>() =&gt; new Date().toISOString()<\u002Fcode>); a test passes <code>() =&gt; '2026-06-16T10:00:00.000Z'<\u002Fcode> so every timestamp in the turn is deterministic. Same shape for the runtime: <code>ports/runtime/runtime-port.ts<\u002Fcode> is a one-line re-export of the <code>AiRuntimePort<\u002Fcode> type above, so core calls <code>ports.runtime.streamEffect(request)<\u002Fcode> and <code>ports.clock.now()<\u002Fcode> and lets someone else supply the real thing.<\u002Fp>\n<h4 id=\"agent-runtime-the-execution-kitchen\"><code>agent-runtime<\u002Fcode> — the execution kitchen<\u002Fh4>\n<p>The mirror image of core: it knows <em>how<\u002Fem> and nothing about <em>why<\u002Fem>. <code>providers/openai/<\u002Fcode> wraps the AI SDK and hides the API key in a closure. <code>runtime/ai-sdk/streaming/tool-loop-agent-runner.ts<\u002Fcode> runs the AI SDK <code>ToolLoopAgent<\u002Fcode>, and <code>runtime/ai-sdk/streaming/stream-part-mapper.ts<\u002Fcode> maps each stream part into a <code>RuntimeEvent<\u002Fcode>.<\u002Fp>\n<p>The piece that closes the \"names become functions\" loop lives in <code>tools/tool-registry.ts<\u002Fcode>. It is <strong>not<\u002Fstrong> itself the <code>Map<\u002Fcode> — the exported surface is <code>createToolRegistry<\u002Fcode>, a factory that returns a <code>ToolRegistry<\u002Fcode> and keeps the <code>Map&lt;string, RuntimeTool&gt;<\u002Fcode> (<code>byName<\u002Fcode>) as a private detail. The important behaviour is <code>resolve(name)<\u002Fcode>: it looks up the internal map and <strong>throws rather than returning null<\u002Fstrong> on a miss.<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// agent-runtime/src/tools/tool-registry.ts\nexport const createToolRegistry = (tools = []): ToolRegistry =&gt; {\n  const byName = new Map&lt;string, RuntimeTool&gt;();\n  for (const tool of tools) byName.set(tool.name, tool);\n\n  return {\n    tools,\n    resolve(name) {\n      const tool = byName.get(name);\n      if (!tool) {\n        throw new AiRuntimeError(\n          RUNTIME_ERROR_CODES.TOOL_UNAVAILABLE,\n          `tool ${name} is not registered`,\n        );\n      }\n      return tool;\n    },\n  };\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So Maya's <code>'jira.search_issues'<\u002Fcode> name from <code>AiRuntimeRequest.toolNames<\u002Fcode> arrives here, <code>registry.resolve('jira.search_issues')<\u002Fcode> returns the executable <code>RuntimeTool<\u002Fcode>, and the AI SDK can finally call it. If core ever sends a name the runtime never registered, you get a loud, named <code>TOOL_UNAVAILABLE<\u002Fcode> error at exactly that line — not a silent <code>undefined<\u002Fcode> that explodes three layers later as a confusing <code>TypeError<\u002Fcode>. Core hands this package an <code>AiRuntimeRequest<\u002Fcode>; it hands back a stream of <code>RuntimeEvent<\u002Fcode>s. It never sees a product policy.<\u002Fp>\n<h4 id=\"db-persistence-behind-a-contract\"><code>db<\u002Fcode> — persistence behind a contract<\u002Fh4>\n<p><code>db<\u002Fcode> defines <code>ConversationRepositoryContract<\u002Fcode> and ships two implementations of it side by side: <code>repositories/memory/<\u002Fcode> (a JS array, for tests and local dev) and <code>repositories/postgres-drizzle/<\u002Fcode> (Drizzle + Postgres). Core only ever sees the contract type, so swapping the array for Postgres changes nothing upstream — the <code>adapterKind: 'memory' | 'postgres-drizzle'<\u002Fcode> field is the only tell.<\u002Fp>\n<h4 id=\"host-bridge-chat-client-side-chat-widget-the-browser-side\"><code>host-bridge<\u002Fcode>, <code>chat-client<\u002Fcode>, <code>side-chat-widget<\u002Fcode> — the browser side<\u002Fh4>\n<p><code>host-bridge<\u002Fcode> is how the embedding page feeds in <code>hostContext<\u002Fcode> (the URL and title of Maya's dashboard) and runs host commands. <code>chat-client<\u002Fcode> is pure transport: <code>transport/client.ts<\u002Fcode> POSTs the request, <code>transport/sse-reader.ts<\u002Fcode> decodes bytes into validated events. <code>side-chat-widget<\u002Fcode> is the React UI — <code>features/chat/model/use-widget-chat.ts<\u002Fcode> builds the request and appends each delta to message state; <code>features/conversation/ui/<\u002Fcode> renders the assistant reply and the tool-activity timeline.<\u002Fp>\n<p>That activity timeline is worth a note, because the \"tool is running\" row Maya sees is data-driven, not a hardcoded string. The row's label comes from the activity event's <code>title<\u002Fcode> field — for a Jira lookup it arrives as something like <code>\"Searching Jira\"<\u002Fcode> (an example value carried on the event, not literal UI copy). The component that renders it lives at <code>features/conversation/ui/tool-activity/widget-tool-activity-details.tsx<\u002Fcode>, and the same <code>activityId<\u002Fcode> updates one row in place: <code>running<\u002Fcode> first, then <code>completed<\u002Fcode> with clickable sources once the tool returns.<\u002Fp>\n<h3 id=\"the-composition-root-partner-ai-service\">The composition root: <code>partner-ai-service<\u002Fcode><\u002Fh3>\n<p>This is the only department allowed to know everyone's home address. <code>composition/<\u002Fcode> is where <code>composePartnerAiService<\u002Fcode> runs every factory in order and produces the wired <code>ports<\u002Fcode> object. <code>adapters/<\u002Fcode> is where the concrete implementations live — <code>adapters/tools/examples/jira-search-issues-tool.ts<\u002Fcode>, <code>adapters/guards/noop-turn-guard-registry.ts<\u002Fcode>, <code>adapters/persistence/<\u002Fcode>. <code>inbound/http/<\u002Fcode> is the front door: the <code>POST /chat/stream<\u002Fcode> route, the auth middleware, the SSE response writer.<\u002Fp>\n<p>If you remember one rule about this package: <strong>every <code>new<\u002Fcode>, every API key, every \"which database\" decision lives here and nowhere else.<\u002Fstrong><\u002Fp>\n<h3 id=\"the-dependency-direction-rule\">The dependency-direction rule<\u002Fh3>\n<p>Arrows point <em>toward<\u002Fem> the contracts, never back toward the wiring. Everything depends on the shared contracts; the service depends on everything; nothing depends on the service.<\u002Fp>\n<figure class=\"dgm\"><div class=\"dep\"><div class=\"dep-row two\"><div class=\"nd contract\"><div class=\"t\">chat-protocol<\u002Fdiv><div class=\"m\">wire types<\u002Fdiv><\u002Fdiv><div class=\"nd contract\"><div class=\"t\">ai-runtime-contract<\u002Fdiv><div class=\"m\">core ⇄ runtime slot<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dep-up\"><span class=\"arrow\">↑<\u002Fspan><\u002Fdiv><div class=\"dep-row pkgs\"><div class=\"nd \"><div class=\"t\">chat-client<\u002Fdiv><\u002Fdiv><div class=\"nd \"><div class=\"t\">host-bridge<\u002Fdiv><\u002Fdiv><div class=\"nd \"><div class=\"t\">side-chat-widget<\u002Fdiv><\u002Fdiv><div class=\"nd core\"><div class=\"t\">partner-ai-core<\u002Fdiv><div class=\"m\">ports<\u002Fdiv><\u002Fdiv><div class=\"nd \"><div class=\"t\">agent-runtime<\u002Fdiv><\u002Fdiv><div class=\"nd \"><div class=\"t\">db<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dep-up\"><span class=\"arrow\">↑<\u002Fspan><\u002Fdiv><div class=\"dep-row\"><div class=\"nd svc\"><div class=\"t\">partner-ai-service<\u002Fdiv><div class=\"m\">composition root — wires all<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><figcaption class=\"dgm-cap\">Everything depends on the contracts; the service depends on everything; <strong>nothing depends on the service.<\u002Fstrong><\u002Ffigcaption><\u002Ffigure>\n<p><strong>The forbidden edges — the ones that would rot the design:<\u002Fstrong><\u002Fp>\n<ul><li><code>partner-ai-core<\u002Fcode> must never import <code>agent-runtime<\u002Fcode>, <code>db<\u002Fcode>, <code>openai<\u002Fcode>, or <code>@ai-sdk<\u002Fcode>. The day it does, you can no longer unit-test a turn decision without a live API key. Core talks to the runtime only through <code>ports/runtime/runtime-port.ts<\u002Fcode>, which is a re-export of the <code>ai-runtime-contract<\u002Fcode> <code>AiRuntimePort<\u002Fcode> type.<\u002Fli><li>No library may import <code>partner-ai-service<\u002Fcode>. The arrow points one way: the service reaches <em>into<\u002Fem> the libraries to wire them; a library reaching <em>back<\u002Fem> would make the wiring un-swappable.<\u002Fli><li><code>agent-runtime<\u002Fcode> must never import <code>partner-ai-core<\u002Fcode>. Execution knows nothing about product policy — it receives a validated <code>AiRuntimeRequest<\u002Fcode> (names only) and trusts it.<\u002Fli><\u002Ful>\n<h3 id=\"telling-a-files-layer-from-its-path\">Telling a file's layer from its path<\u002Fh3>\n<p>You can usually place a file without reading it, just from where it sits:<\u002Fp>\n<ul><li><strong><code>packages/.../ports/...<\u002Fcode><\u002Fstrong> → an interface core <em>needs<\u002Fem>. A wish-list, not an implementation. (<code>ports/lifecycle/clock.ts<\u002Fcode> is just <code>{ readonly now: () =&gt; string }<\u002Fcode>.)<\u002Fli><li><strong><code>apps/.../adapters/...<\u002Fcode><\u002Fstrong> → a concrete implementation of one of those ports. Real I/O lives here. (<code>adapters/guards/noop-turn-guard-registry.ts<\u002Fcode> satisfies <code>TurnGuardRegistryPort<\u002Fcode>.)<\u002Fli><li><strong><code>apps/.../composition/...<\u002Fcode><\u002Fstrong> → wiring. Functions named <code>create*<\u002Fcode> that return a <code>*Bundle<\u002Fcode>; this is where adapters get plugged into ports.<\u002Fli><li><strong><code>packages/.../domain/...<\u002Fcode><\u002Fstrong> → pure decision logic, no I/O. The manifest and <code>TurnPolicyDecision<\u002Fcode> live here.<\u002Fli><li><strong><code>packages/.../application/...<\u002Fcode><\u002Fstrong> → orchestration that sequences domain logic and port calls (the turn pipeline).<\u002Fli><li><strong><code>packages/side-chat-widget/src/...<\u002Fcode><\u002Fstrong> follows Feature-Sliced Design — <code>widgets/<\u002Fcode> compose <code>features/<\u002Fcode>, which compose <code>entities/<\u002Fcode>, which use <code>shared/<\u002Fcode>. The arrows point downward; <code>entities/<\u002Fcode> never imports <code>features/<\u002Fcode>.<\u002Fli><\u002Ful>\n<p>A quick test of the whole map: if a file imports a database driver or an API client, it belongs in <code>apps/partner-ai-service<\u002Fcode>. If it only imports types and other libraries, it belongs in <code>packages/<\u002Fcode>. When that rule is violated, the design is leaking — and that's exactly the kind of thing <strong>Section 8 (How to navigate)<\u002Fstrong> teaches you to check. For the patterns these layers are built from (ports/adapters, factories, the composition root), see <strong>Section 3<\u002Fstrong>; for the live trace of one request hopping across these packages, see <strong>Section 5<\u002Fstrong>.<\u002Fp>\n<hr>\n<p>Revision complete. Every critique item is addressed:<\u002Fp>\n<ul><li><strong>High — zero code snippets:<\u002Fstrong> Added five verified snippets from the knowledge base / live files at the highest-value seams: <code>encodeSseEvent<\u002Fcode> (chat-protocol), <code>AiRuntimeRequest.toolNames<\u002Fcode> and <code>AiRuntimePort<\u002Fcode> (ai-runtime-contract), <code>ClockPort<\u002Fcode> (core ports), and <code>createToolRegistry<\u002Fcode>/<code>resolve<\u002Fcode> (agent-runtime).<\u002Fli><li><strong>Medium — \"names become functions\" left as prose:<\u002Fstrong> Now shown as an explicit before/after — the <code>readonly toolNames: readonly string[]<\u002Fcode> field on one side, <code>registry.resolve(name) -&gt; RuntimeTool<\u002Fcode> on the other, threaded with Maya's <code>'jira.search_issues'<\u002Fcode>.<\u002Fli><li><strong>Medium — tool-registry mis-described as \"the Map\":<\u002Fstrong> Corrected to <code>createToolRegistry<\u002Fcode> returning a <code>ToolRegistry<\u002Fcode>, with the <code>Map&lt;string, RuntimeTool&gt;<\u002Fcode> (<code>byName<\u002Fcode>) called out as an internal detail; kept the \"throws rather than returns null\" point.<\u002Fli><li><strong>Low — \"Searching Jira\" as quoted UI copy:<\u002Fstrong> Softened to an example <code>title<\u002Fcode> value carried on the activity event, with the real component path (<code>widget-tool-activity-details.tsx<\u002Fcode>) cited.<\u002Fli><li><strong>Low — unnamed streaming file:<\u002Fstrong> Now names <code>tool-loop-agent-runner.ts<\u002Fcode> (runs the AI SDK <code>ToolLoopAgent<\u002Fcode>) and <code>stream-part-mapper.ts<\u002Fcode> (maps each part to a <code>RuntimeEvent<\u002Fcode>), matching the path specificity of every other subsection.<\u002Fli><\u002Ful>\n<p>Verified against live files: <code>packages/ai-runtime-contract/src/index.ts<\u002Fcode> (lines 80, 270-272), <code>packages/partner-ai-core/src/ports/lifecycle/clock.ts<\u002Fcode> (lines 1-3), <code>packages/agent-runtime/src/tools/tool-registry.ts<\u002Fcode> (the <code>createToolRegistry<\u002Fcode>/<code>ToolRegistry<\u002Fcode>/<code>byName<\u002Fcode>/<code>resolve<\u002Fcode> shape), the streaming filenames under <code>packages/agent-runtime/src/runtime/ai-sdk/streaming/<\u002Fcode>, and the tool-activity component path.<\u002Fp>\n<hr>\n<h2 id=\"5-life-of-a-turn-one-message-traced-end-to-end\">5. Life of a Turn: One Message, Traced End to End<\u002Fh2>\n<p>Maya types \"show me my open Jira tickets\" into the side panel. By the time three Jira tickets stream back as a tidy summary, her one message has passed through roughly fourteen distinct hops across three machines (her browser, the HTTP edge, and the core/runtime backend). This section traces every hop with the real function, the real data at that point, and the concrete failure you would get if that hop did not exist.<\u002Fp>\n<p>The single most important idea to hold onto: <strong>the turn runs in two phases split by one line of code.<\u002Fstrong> Phase one is ten <em>pre-start<\u002Fem> steps that all run <em>before<\u002Fem> the browser receives a single byte. Phase two is the <em>streaming<\u002Fem> phase. The boundary is the moment the first SSE frame (<code>sidechat.started<\u002Fcode>) is flushed. A failure before the boundary is a clean HTTP error (400/403/500 with a JSON body). A failure after the boundary cannot change the HTTP status — the <code>200 text/event-stream<\u002Fcode> header is already sent — so it must arrive as a <code>sidechat.error<\u002Fcode> event inside the already-open stream. Keep this split in mind; it is why the steps are ordered the way they are.<\u002Fp>\n<h3 id=\"at-a-glance\">At a glance<\u002Fh3>\n<div class=\"tablewrap\"><table><thead><tr><th>#<\u002Fth><th>Hop<\u002Fth><th>Where it runs<\u002Fth><th>What happens<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>0<\u002Ftd><td>HTTP route parse<\u002Ftd><td>Edge (Hono)<\u002Ftd><td>Validate body, brand IDs, build <code>StreamChatInput<\u002Fcode><\u002Ftd><\u002Ftr><tr><td>1<\u002Ftd><td>Authority check<\u002Ftd><td>Core<\u002Ftd><td>Maya may act in this workspace?<\u002Ftd><\u002Ftr><tr><td>2<\u002Ftd><td>Request scope<\u002Ftd><td>Core<\u002Ftd><td>Stamp <code>requestId<\u002Fcode>/<code>traceId<\u002Fcode>, capture <code>startedAt<\u002Fcode><\u002Ftd><\u002Ftr><tr><td>3<\u002Ftd><td>Observe <code>received<\u002Fcode><\u002Ftd><td>Core<\u002Ftd><td>First lifecycle record<\u002Ftd><\u002Ftr><tr><td>4<\u002Ftd><td>Resolve turn plan<\u002Ftd><td>Core<\u002Ftd><td>Manifest + profile → <code>TurnPolicyDecision<\u002Fcode> (allowlist)<\u002Ftd><\u002Ftr><tr><td>5<\u002Ftd><td>Run turn guards<\u002Ftd><td>Core<\u002Ftd><td>Safety checks on raw text, before context exists<\u002Ftd><\u002Ftr><tr><td>6<\u002Ftd><td>Ensure conversation<\u002Ftd><td>Core → DB<\u002Ftd><td>Upsert + re-check ownership<\u002Ftd><\u002Ftr><tr><td>7<\u002Ftd><td>Append user message<\u002Ftd><td>Core → DB<\u002Ftd><td>Persist Maya's text as <code>role: user<\u002Fcode><\u002Ftd><\u002Ftr><tr><td>8<\u002Ftd><td>Start assistant turn<\u002Ftd><td>Core → DB<\u002Ftd><td>Open <code>running<\u002Fcode> turn row<\u002Ftd><\u002Ftr><tr><td>9<\u002Ftd><td>Prepare context<\u002Ftd><td>Core<\u002Ftd><td>History + page context → model-ready messages<\u002Ftd><\u002Ftr><tr><td>10<\u002Ftd><td>Observe <code>started<\u002Fcode><\u002Ftd><td>Core<\u002Ftd><td>Pre-start done; <code>PreparedStreamChatTurn<\u002Fcode> returned<\u002Ftd><\u002Ftr><tr><td>—<\u002Ftd><td><strong>TRUST BOUNDARY<\u002Fstrong><\u002Ftd><td>—<\u002Ftd><td><strong>First byte to browser begins here<\u002Fstrong><\u002Ftd><\u002Ftr><tr><td>11<\u002Ftd><td>Build model request<\u002Ftd><td>Core<\u002Ftd><td>Assemble <code>AiRuntimeRequest<\u002Fcode> (names only)<\u002Ftd><\u002Ftr><tr><td>12<\u002Ftd><td>Runtime + tool loop<\u002Ftd><td>Runtime<\u002Ftd><td>Model calls <code>jira.search_issues<\u002Fcode>; activity rows<\u002Ftd><\u002Ftr><tr><td>13<\u002Ftd><td>Runtime → protocol map<\u002Ftd><td>Core<\u002Ftd><td><code>RuntimeEvent<\u002Fcode> → <code>sidechat.*<\u002Fcode> events<\u002Ftd><\u002Ftr><tr><td>14<\u002Ftd><td>SSE wire + client decode<\u002Ftd><td>Edge → Browser<\u002Ftd><td>Frame, flush, validate sequence<\u002Ftd><\u002Ftr><tr><td>15<\u002Ftd><td>Finalize + persist<\u002Ftd><td>Core → DB<\u002Ftd><td>Mark turn <code>completed<\u002Fcode>, store the answer<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<p>The entrypoint that stitches phase one to phase two is two small functions. The public one resolves services; the private one composes preflight then the live stream:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// stream-chat.ts — public entrypoint: resolve ports, then build the stream\nexport const streamChatEffect = (input: StreamChatInput) =&gt; {\n  const resolvedServices = Effect.map(partnerAiCoreServicesEffect, (ports) =&gt;\n    createStreamChatStream(ports, input),\n  );\n  return Stream.unwrap(resolvedServices);\n};\n\n// the private function that actually pairs preflight with the protocol stream\nconst createStreamChatStream = (ports: StreamChatPorts, input: StreamChatInput) =&gt; {\n  const preparedTurn = Effect.map(prepareStreamChatTurn(ports, input), (turn) =&gt;\n    createProtocolEventStream(ports, input, turn),\n  );\n  return Stream.unwrap(preparedTurn);\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The \"prepare THEN protocol\" framing lives on <code>createStreamChatStream<\u002Fcode>: <code>prepareStreamChatTurn<\u002Fcode> is hops 1–10, and only if that Effect succeeds does <code>createProtocolEventStream<\u002Fcode> (hops 11–15) get built. That is the whole two-phase split in one <code>Effect.map<\u002Fcode>.<\u002Fp>\n<hr>\n<h3 id=\"hop-0-the-http-route-parse-and-brand\">Hop 0 — The HTTP route: parse and brand<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Maya's request lands at one POST endpoint. Before any business logic runs, the edge validates the JSON shape and converts loose strings into branded IDs so the rest of the system can trust them.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>registerChatStreamRoute<\u002Fcode> in <code>chat-stream.ts<\u002Fcode> reads the raw body and calls <code>parseChatStreamRequest<\u002Fcode> (from <code>@side-chat/chat-protocol<\u002Fcode>). That validator rejects unknown keys and brands <code>requestId<\u002Fcode>, <code>conversationId<\u002Fcode>, and <code>message.id<\u002Fcode>. The route then builds <code>StreamChatInput<\u002Fcode> and starts pulling events:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const chatRequest = parseChatStreamRequest(parsed.value);\nconst eventIterator = Stream.toAsyncIterable(\n  streamChatEffect({ workspace, hostAppId, request: chatRequest, authContext,\n    abortSignal: context.req.raw.signal, ...traceInput(context.req.raw) })\n    .pipe(Stream.provide(coreLayer)),\n)[Symbol.asyncIterator]();\nconst firstEvent = await eventIterator.next(); // &lt;-- the trust boundary, awaited here<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> Maya's wire payload, validated:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">json<\u002Fspan><pre><code>{\n  \"protocolVersion\": \"sidechat.v1\",\n  \"requestId\": \"req_01jwzx9k4m3qcb7n\",\n  \"message\": { \"id\": \"msg_01jwzxa1c9vde6f8\", \"content\": \"show me my open Jira tickets\" },\n  \"hostContext\": { \"schemaVersion\": \"1\", \"url\": \"https://app.example.com/projects/sidechat\" }\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Notice there is <strong>no <code>role<\u002Fcode> field<\u002Fstrong> on the message and <strong>no <code>conversationId<\u002Fcode><\u002Fstrong> (this is her first message). The browser never asserts a role — core assigns <code>user<\u002Fcode> later (hop 7). That is deliberate: if the browser could send <code>role: \"system\"<\u002Fcode>, it could smuggle instructions into the prompt.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> If the browser sent <code>role: \"system\"<\u002Fcode>, <code>parseChatStreamRequest<\u002Fcode>'s <code>requireKnownKeys<\u002Fcode> (which only allows <code>[\"id\", \"content\"]<\u002Fcode>) throws <code>ProtocolValidationError<\u002Fcode> and returns a plain 400 — no stream, no persistence. A prompt-injection escalation is rejected at the door.<\u002Fp>\n<hr>\n<h3 id=\"hop-1-authority-may-maya-act-in-this-workspace\">Hop 1 — Authority: may Maya act in this workspace?<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Being authenticated is not the same as \"allowed to touch <em>this<\u002Fem> workspace.\" The system never treats a raw login token as identity here; an upstream trusted authority adapter has already resolved Maya into a typed <code>AuthContext<\u002Fcode>. This step checks that resolved subject against the requested tenant/workspace.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>resolveAuthorizedContext<\u002Fcode> calls <code>assertWorkspaceAuthority<\u002Fcode>, which compares the context's <code>tenantId<\u002Fcode>/<code>workspaceId<\u002Fcode> against the requested workspace — both read as <strong>top-level<\u002Fstrong> fields:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const authorityDecision = assertWorkspaceAuthority(input.authContext, input.workspace);\nif (!authorityDecision.allowed) {\n  return yield* Effect.fail(mapAuthorityDenialToError(authorityDecision.code, authorityDecision.message));\n}\nreturn authorityDecision.authContext;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Inside <code>assertWorkspaceAuthority<\u002Fcode> (<code>authority.ts<\u002Fcode>), the comparison is flat — there is no nested <code>workspace<\u002Fcode> object:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const matchesTenant = required.authContext.tenantId === workspace.tenantId;\nconst matchesWorkspace = required.authContext.workspaceId === workspace.workspaceId;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> A narrowed, non-undefined <code>AuthContext<\u002Fcode>. The type is <code>WorkspaceRef &amp; {...}<\u002Fcode>, so <code>tenantId<\u002Fcode> and <code>workspaceId<\u002Fcode> sit at the top level, and <code>source<\u002Fcode> is one of <code>signed_service_token | session_authority | test_authority<\u002Fcode> — never <code>\"jwt\"<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>{ source: 'session_authority',\n  tenantId: 'acme', workspaceId: 'workspace_001',\n  subject: { subjectId: 'subject_maya_001', userId: 'user_maya' },\n  roles: ['member'],\n  scopes: ['conversation:write', 'tool:invoke'],\n  issuedAt: '2026-06-16T09:59:59.500Z' }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>What breaks without it.<\u002Fstrong> A request carrying a valid <code>acme<\u002Fcode> authority but a forged <code>workspaceId<\u002Fcode> for another tenant would reach the conversation upsert (hop 6) and write rows under the wrong tenant. This check fails with <code>CROSS_TENANT_WORKSPACE<\u002Fcode> before any persistence — closing a multi-tenant data leak.<\u002Fp>\n<hr>\n<h3 id=\"hop-2-request-scope-the-correlation-stamp\">Hop 2 — Request scope: the correlation stamp<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Everything that happens for this turn needs one stable ID to tie its logs together. This synchronous step mints that pair.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>createStreamChatRequestScope<\u002Fcode> produces <code>(requestId, traceId)<\u002Fcode> and captures the start time from the clock port (core never calls <code>new Date()<\u002Fcode> directly):<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createStreamChatRequestScope = (ports, input): StreamChatRequestScope =&gt; ({\n  correlation: createRequestCorrelation({ requestId: input.request.requestId, traceId: input.traceId }),\n  startedAt: ports.clock.now(),\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>{ correlation: { requestId: 'req_abc123', traceId: 'trc_xyz' }, startedAt: '2026-06-16T10:00:00.000Z' }<\u002Fcode>. This scope is threaded everywhere but never persisted on its own.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> Two concurrent Maya requests would emit interleaved log lines with no way to separate them. Latency measurements would have no <code>startedAt<\u002Fcode> anchor.<\u002Fp>\n<hr>\n<h3 id=\"hop-3-observability-the-received-record\">Hop 3 — Observability: the <code>received<\u002Fcode> record<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Emit the first lifecycle event for monitoring, carrying the raw user text so an operator can see exactly what arrived.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong><\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>recordStreamObservationEffect(ports.observability, {\n  correlation: requestScope.correlation,\n  lifecycleState: 'received',\n  startedAt: requestScope.startedAt,\n  attributes: { requestId, message, authSource, subjectId },\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>{ lifecycleState: 'received', attributes: { message: { role: 'user', content: 'show me my open Jira tickets' }, authSource: 'session_authority', subjectId: 'subject_maya_001' } }<\u002Fcode>. Note that raw text is not unique to <code>received<\u002Fcode>: the <code>started<\u002Fcode> record (hop 10) also carries <code>prompt: input.request.message.content<\u002Fcode>. So both <code>received<\u002Fcode> and <code>started<\u002Fcode> see the raw prompt; only <code>completed<\u002Fcode> omits it. If no sink is configured, this short-circuits to <code>Effect.void<\u002Fcode> silently.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> No audit record that the request even arrived. A request that crashes in hop 4 would leave zero trace of Maya's input for debugging.<\u002Fp>\n<hr>\n<h3 id=\"hop-4-resolve-the-turn-plan-which-tools-are-allowed-this-turn\">Hop 4 — Resolve the turn plan: which tools are allowed <em>this<\u002Fem> turn<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> This is the security heart of the turn. Core loads the deployment's full menu of capabilities (the <strong>manifest<\u002Fstrong> — a plain JSON catalog of every tool/profile that exists), picks the assistant profile, and narrows everything down to a closed allowlist of tool <em>names<\u002Fem> for this one turn. Think menu (manifest) versus the one table's order ticket (the decision).<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>resolveAllowedTurnPlan<\u002Fcode> runs three sub-steps: load + validate the manifest, hash it, then resolve and cross-validate the policy decision:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const manifest = yield* loadValidatedManifest(ports, input, authContext);\nconst manifestHash = hashHostCapabilityManifest(manifest);\nconst policyDecision = yield* resolveValidatedTurnPolicy(ports, input, authContext, manifest, manifestHash);\nconst policy = yield* mapPortFailure(ports.policies.evaluate({ ... }), STREAM_CHAT_FAILURES.POLICY);\nif (!policy.allowed) return yield* Effect.fail(mapPolicyDenialToError(policy));<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The validation step is two layered set checks — a tool name must be in the manifest <strong>and<\u002Fstrong> in the profile's own allowlist:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// turn-policy-validation.ts — the two-layer tool check\nconst manifestToolIssues = unknownValueIssues(decision.allowedToolNames, manifestToolNamesSet, ...);\nconst profileToolIssues  = unknownValueIssues(decision.allowedToolNames,\n  new Set(profile.defaultToolPolicy.allowedToolNames), ...);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> The <code>TurnPolicyDecision<\u002Fcode> — a <em>copy<\u002Fem> of profile fields plus the manifest hash, not a pointer into the manifest:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>{ profileId: 'default', executorId: 'ai-sdk-tool-loop',\n  providerId: 'openai', modelId: 'gpt-5.4-mini',\n  allowedToolNames: ['jira.search_issues'], manifestHash: 'sha256:ab12...' }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>This <code>allowedToolNames<\u002Fcode> list is the <em>only<\u002Fem> thing that decides which tools the model will ever see. The model does not choose its own tools; the runtime does not discover them.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> Without the <em>profile<\u002Fem> check, a buggy or compromised turn-policy resolver could inject <code>jira.search_issues<\u002Fcode> into a profile that never approved Jira — privilege escalation. Without the <em>manifest<\u002Fem> check, a profile could reference a tool the deployment never registered, and the model would call a tool with no executable behind it. The double check makes the decision tamper-evident: it can never grant more than the profile permits.<\u002Fp>\n<hr>\n<h3 id=\"hop-5-turn-guards-safety-on-the-raw-text-before-context-exists\">Hop 5 — Turn guards: safety on the raw text, before context exists<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Run safety checks (e.g. a prompt-injection guard) on Maya's raw message <em>before<\u002Fem> the system prompt, tool schemas, or page context have been assembled.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>runSelectedTurnGuards<\u002Fcode> looks up the profile's named guards in the registry, fails closed if any are missing, and runs each in serial:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const selectedGuards = yield* selectTurnGuards(registry, turnPlan);\nfor (const guard of selectedGuards) {\n  const decision = yield* mapPortFailure(guard.check(guardInput), STREAM_CHAT_FAILURES.TURN_GUARD);\n  if (decision.kind === 'block') return yield* Effect.fail(toBlockedTurnGuardError(decision));\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The guard's input type, <code>TurnGuardInput<\u002Fcode>, gives guards <code>{ userMessage, authContext, workspace, profileId, safetyPolicyId }<\u002Fcode> — and pointedly <strong>no<\u002Fstrong> <code>preparedContext<\u002Fcode> or tool schemas.<\u002Fp>\n<p><strong>The data at this point.<\u002Fstrong> <code>TurnGuardInput { userMessage: 'show me my open Jira tickets', profileId: 'default', ... }<\u002Fcode> → <code>[{ kind: 'allow' }]<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it (ordering).<\u002Fstrong> If guards ran <em>after<\u002Fem> context preparation (hop 9), a prompt-injection payload would already have been handed the system instructions and tool list to craft a more effective second attack. Running before context is a deliberate exposure-minimizing ordering. And \"fail closed\" matters: if a deployment misconfigures the guard name, the turn is rejected rather than silently skipping the safety check.<\u002Fp>\n<hr>\n<h3 id=\"hop-6-ensure-conversation-upsert-then-re-check-ownership\">Hop 6 — Ensure conversation: upsert, then re-check ownership<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Find or create the conversation row, then prove again that Maya owns it.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>ensureAuthorizedConversation<\u002Fcode> upserts via the conversations port (using a generated fallback ID since Maya sent none), then re-runs the authority check on the <em>returned<\u002Fem> conversation:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const conversation = yield* mapPortFailure(\n  ports.conversations.ensureConversation({ authContext,\n    requestedConversationId: input.request.conversationId,\n    fallbackConversationId: ports.ids.nextConversationId() }),\n  STREAM_CHAT_FAILURES.PERSISTENCE);\nconst conversationDecision = assertWorkspaceAuthority(authContext, conversation);\nif (conversationDecision.allowed) return conversation;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>ConversationRef { tenantId: 'acme', workspaceId: 'workspace_001', conversationId: 'conv_01jwzx8p2n0ab5r3' }<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> The second authority check is not redundant. If Maya supplied a <em>known<\u002Fem> <code>conversationId<\u002Fcode> belonging to another user, the upsert would load it and — without the re-check — she could read someone else's history. The re-check blocks the IDOR (insecure direct object reference) attack.<\u002Fp>\n<hr>\n<h3 id=\"hop-7-append-the-user-message\">Hop 7 — Append the user message<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Durably persist Maya's text with the role core assigns: <code>user<\u002Fcode>.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong><\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>ports.conversations.appendUserMessage({ authContext,\n  conversationId: conversation.conversationId,\n  message: input.request.message }); // role is always 'user', assigned by core<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>MessageRef { messageId: 'msg_usr_0042', sequenceIndex: 42, conversationId: 'conv_01jwzx8p2n0ab5r3' }<\u002Fcode>. The returned <code>sequenceIndex<\u002Fcode> is load-bearing: the context manager (hop 9) reads history <em>up to<\u002Fem> <code>sequenceIndex - 1<\u002Fcode> so the current question is not duplicated in the prompt.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> With no <code>sequenceIndex<\u002Fcode> fence, the context builder either re-includes the current message (the model sees Maya's question twice) or has no stable cutoff for history reads.<\u002Fp>\n<hr>\n<h3 id=\"hop-8-start-the-assistant-turn-record\">Hop 8 — Start the assistant turn record<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Open a durable <code>running<\u002Fcode> row capturing exactly which policy was in effect, so the turn is auditable even after a crash.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong><\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>ports.assistantTurns.startAssistantTurn({ authContext, conversation, userMessage, request,\n  profileId: turnPlan.policyDecision.profileId,\n  profileVersion: turnPlan.policyDecision.profileVersion,\n  systemPromptId: turnPlan.profile.systemPromptId,\n  manifestHash: turnPlan.manifestHash,\n  providerId: turnPlan.policyDecision.providerId,\n  modelId: turnPlan.policyDecision.modelId,\n  now: ports.clock.now() });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>AssistantTurnRef { assistantTurnId: 'turn_01jwzxa3d0ghk2p9', status: 'running', inserted: true }<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> This is the start of the compensating-transaction window. Once the <code>running<\u002Fcode> row exists, hop 9's context preparation — <code>prepareAndRecordTurnContext<\u002Fcode>, including the context-snapshot write — wraps its work in <code>failStartedTurnOnError<\u002Fcode>, which catches any error, calls <code>failAssistantTurn<\u002Fcode> to mark the row <code>provider_failed<\u002Fcode>/<code>persistence_failed<\u002Fcode>, then re-fails. (Hop 10's <code>started<\u002Fcode> observation is <em>not<\u002Fem> inside that failable persistence window — it is a plain observability emit.) Without it, a failure in hop 9 would leave a row stuck at <code>running<\u002Fcode> forever, poisoning \"list running turns\" queries and usage accounting.<\u002Fp>\n<hr>\n<h3 id=\"hop-9-prepare-context-the-model-ready-message-board\">Hop 9 — Prepare context: the model-ready message board<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Gather conversation history, the host page context, the system instructions, and tool descriptions, then trim to fit the token budget. This is the biggest single pre-start operation.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>ports.contextManager.prepareTurnContext<\u002Fcode> returns a <code>PreparedTurnContext<\u002Fcode>, and the snapshot is persisted to the turn row:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const preparedContext = yield* failStartedTurnOnError(ports, authContext, assistantTurnId,\n  mapPortFailure(ports.contextManager.prepareTurnContext({ authContext, workspace, conversation,\n    currentUserMessage, request, manifest, policyDecision, now, abortSignal }),\n    STREAM_CHAT_FAILURES.CONTEXT));\nyield* recordPreparedContextSnapshot(ports, input, contextInput, preparedContext);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>PreparedTurnContext.runtimeMessages<\u002Fcode> carries <strong>only<\u002Fstrong> history plus the current user message — never a <code>system<\u002Fcode> message:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>runtimeMessages: [\n  { role: 'user', content: 'show me my open Jira tickets' },\n]<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>This is the key layering rule: the system instruction is <em>not<\u002Fem> part of <code>runtimeMessages<\u002Fcode>. It lives separately as <code>policyDecision.systemInstructions<\u002Fcode> and is prepended later by <code>buildModelMessages<\u002Fcode> (hop 11). Keeping them apart is what makes \"core is the only place that assembles system instructions\" an enforceable invariant — the context manager cannot smuggle a <code>system<\u002Fcode> turn in.<\u002Fp>\n<p>Each context section is also stamped with a <code>trustLevel<\u002Fcode> (<code>user_provided<\u002Fcode>, <code>untrusted_external<\u002Fcode>, <code>server_verified<\u002Fcode>) and rendered under a fixed paragraph telling the model the sections are reference data, not instructions.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> Without the trust-boundary paragraph, a malicious value injected via <code>hostContext.title<\u002Fcode> (\"Ignore previous instructions and...\") would reach the model indistinguishable from a system instruction — a prompt-injection vector. The boundary wording in <code>render-context-board-message.ts<\u002Fcode> is part of the security contract.<\u002Fp>\n<hr>\n<h3 id=\"hop-10-observe-started-pre-start-is-done\">Hop 10 — Observe <code>started<\u002Fcode>: pre-start is done<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Emit the second lifecycle record, then assemble the <code>PreparedStreamChatTurn<\u002Fcode> that the streaming phase consumes.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>recordStartedStreamTurn<\u002Fcode> emits <code>{ lifecycleState: 'started', assistantTurnId, providerId, modelId, profileId, contextManifestHash, prompt }<\u002Fcode> (it does carry the raw prompt), then <code>toPreparedStreamChatTurn<\u002Fcode> merges all ten steps' outputs.<\u002Fp>\n<p><strong>The data at this point.<\u002Fstrong> <code>PreparedStreamChatTurn { authContext, correlation, conversation, userMessage, assistantTurn, manifestHash, policyDecision, turnGuardDecisions, preparedContext }<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> This is the last step inside <code>prepareStreamChatTurn<\u002Fcode>. When it returns, the route's awaited <code>eventIterator.next()<\u002Fcode> finally resolves — with <code>sidechat.started<\u002Fcode>. Everything up to here ran <em>before<\u002Fem> that resolution, which is exactly why a failure anywhere in hops 1–10 surfaces as a JSON HTTP error and not a half-open stream.<\u002Fp>\n<hr>\n<h3 id=\"trust-boundary-the-first-byte\">TRUST BOUNDARY — the first byte<\u002Fh3>\n<figure class=\"dgm\"><div class=\"tb\"><div class=\"tb-side\"><div class=\"h\">Pre-start · steps 1–10<\u002Fdiv><div class=\"s\">fail = JSON 4xx/5xx · no SSE<\u002Fdiv><\u002Fdiv><div class=\"tb-div\"><span class=\"tb-badge\">first byte<\u002Fspan><\u002Fdiv><div class=\"tb-side hot\"><div class=\"h\">Streaming · steps 11–15<\u002Fdiv><div class=\"s\">fail = <span class=\"mc\">sidechat.error<\u002Fspan> inside open SSE<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"tb-flow\"><span class=\"mc\">prepareStreamChatTurn<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"mc\">createProtocolEventStream<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"emits\">emits <span class=\"mc\">sidechat.started<\u002Fspan><\u002Fspan><\u002Fdiv><figcaption class=\"dgm-cap\">One line of code splits the turn: fail before the first byte → clean HTTP error; fail after → an error inside the open stream.<\u002Ffigcaption><\u002Ffigure>\n<p><code>createProtocolEventStream<\u002Fcode> opens with a <code>Ref&lt;ProtocolEventAccumulator&gt;<\u002Fcode> and a <code>Ref&lt;number&gt;<\u002Fcode> for the protocol sequence (starting at <strong>1<\u002Fstrong>). It concatenates three stream segments: <code>started<\u002Fcode>, <code>runtimeEvents<\u002Fcode>, <code>finalized<\u002Fcode>.<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const started       = Stream.fromEffect(emitStartedEvent(...));            // segment A\nconst runtimeEvents = createObservedRuntimeEventStream(...);               // segment B\nconst finalized     = Stream.fromEffectDrain(finalizeProtocolStream(...)); // segment C\nreturn Stream.concat(started, Stream.concat(runtimeEvents, finalized));<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>emitStartedEvent<\u002Fcode> hardcodes sequence <code>0<\u002Fcode> and is the first flushed frame:<\u002Fp>\n<figure class=\"codeblock\"><pre><code>id: evt_01jwzxa3f0abc001\nevent: sidechat.started\ndata: {\"type\":\"sidechat.started\",\"assistantTurnId\":\"turn_01jwzxa3d0ghk2p9\",\"conversationId\":\"conv_01jwzx8p2n0ab5r3\",\"sequence\":0,...}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The sequence counter starts at 1 but does <strong>not<\u002Fstrong> advance for events that map to <code>undefined<\u002Fcode> (like <code>runtime.started<\u002Fcode>). It only advances after a browser-visible event is actually emitted. That is why there is never a gap: <code>started<\u002Fcode> consumes 0, and the first <em>runtime-produced<\u002Fem> browser event takes 1.<\u002Fp>\n<hr>\n<h3 id=\"hop-11-build-the-model-request-names-cross-the-coreruntime-boundary\">Hop 11 — Build the model request: names cross the core/runtime boundary<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Assemble the final provider-neutral <code>AiRuntimeRequest<\u002Fcode>. This is where core hands off to the runtime — and where tools become <em>names only<\u002Fem>, never executables.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>buildModelTurnRequest<\u002Fcode> maps the prepared turn into the request. The message order is a code-enforced invariant, and <strong>this is where the system instruction is finally prepended<\u002Fstrong> — it was never in <code>runtimeMessages<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// build-model-turn-request.ts — buildModelMessages: the only place system text is added\nconst buildModelMessages = (turn) =&gt; {\n  const contextBoardMessage = renderContextBoardMessage(turn.preparedContext.contextBoard);\n  return [\n    { role: \"system\", content: turn.policyDecision.systemInstructions }, // &lt;-- prepended here\n    ...(contextBoardMessage ? [contextBoardMessage] : []),\n    ...turn.preparedContext.runtimeMessages, // history + current user message\n  ];\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The request itself:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const buildModelTurnRequest = (input, turn): AiRuntimeRequest =&gt; ({\n  requestId: input.request.requestId,\n  assistantTurnId: turn.assistantTurnId,\n  executorId: turn.policyDecision.executorId,\n  providerId: turn.policyDecision.providerId,\n  modelId: turn.policyDecision.modelId,\n  messages: buildModelMessages(turn),\n  toolNames: turn.policyDecision.allowedToolNames, // ['jira.search_issues'] — names, not functions\n  toolScope: { hostAppId: input.hostAppId, workspaceId: turn.authContext.workspaceId,\n    subjectId: turn.authContext.subject.subjectId, conversationId: turn.conversation.conversationId,\n    assistantTurnId: turn.assistantTurnId, allowedHostCommandNames: turn.policyDecision.allowedCommandNames },\n  abortSignal: input.abortSignal,\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> <code>messages<\u002Fcode> is <code>[{ role: 'system', content: 'Use concise analyst language.' }, ...contextBoard?, { role: 'user', content: 'show me my open Jira tickets' }]<\u002Fcode>; <code>toolNames: ['jira.search_issues']<\u002Fcode>; and a <code>toolScope<\u002Fcode> carrying Maya's <code>subjectId: 'subject_maya_001'<\u002Fcode>. The scope is the trusted server-side context the tool uses for auth — the model influences only the tool input, never the scope.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> This is the architectural seam. Before it, tools are <code>string[]<\u002Fcode>. After it, the runtime resolves those names into executable <code>RuntimeTool<\u002Fcode> objects locally. Without <code>toolScope<\u002Fcode>, <code>jira.search_issues<\u002Fcode> calls <code>readJiraToolScope<\u002Fcode>, finds no scope, and fails with <code>TOOL_FAILED<\u002Fcode> — because the tool cannot authenticate to Jira without Maya's identity injected server-side.<\u002Fp>\n<hr>\n<h3 id=\"hop-12-the-runtime-and-the-tool-loop\">Hop 12 — The runtime and the tool loop<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> The runtime opens the model stream with exactly the allowed tools. The model decides to call <code>jira.search_issues<\u002Fcode>, the runtime executes it, and each phase of that call becomes an activity row Maya sees.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> The runtime resolves names to executables (<code>registry.resolve(name)<\u002Fcode> throws <code>TOOL_UNAVAILABLE<\u002Fcode> on a miss), wraps each as an AI SDK tool, and opens the <code>ToolLoopAgent<\u002Fcode> stream with <code>toolChoice: 'auto'<\u002Fcode>. As stream parts arrive, <code>mapAiSdkToolActivity<\u002Fcode> emits <code>RuntimeEvent<\u002Fcode> activity rows — all sharing the same <code>toolCallId<\u002Fcode> as <code>activityId<\u002Fcode> so the UI updates <em>one row in place<\u002Fem>:<\u002Fp>\n<ul><li><code>tool-input-start<\u002Fcode> → activity <code>running<\u002Fcode>, empty input (\"Searching Jira…\" appears instantly).<\u002Fli><li><code>tool-call<\u002Fcode> → same row, now with the real input.<\u002Fli><li>The tool's <code>execute<\u002Fcode> Effect runs:<\u002Fli><\u002Ful>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>execute: (input, context) =&gt; Effect.gen(function* () {\n  const searchInput = yield* readJiraSearchIssuesInput(input);  // { query: '...', maxResults: 10 }\n  const scope       = yield* readJiraToolScope(context);        // Maya's IDs, from toolScope\n  const issues      = yield* jiraClient.searchIssues({ query: searchInput.query, ...scope, ... });\n  return toJiraSearchIssuesResult(issues);                      // { count, issues: [...] }\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<ul><li><code>tool-result<\u002Fcode> → <code>readSources(result)<\u002Fcode> extracts clickable links, then activity flips to <code>completed<\u002Fcode>.<\u002Fli><\u002Ful>\n<p><strong>The data at this point.<\u002Fstrong> The result returned to the model:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">json<\u002Fspan><pre><code>{ \"count\": 2, \"issues\": [\n  { \"key\": \"SC-42\", \"summary\": \"Adopt assistant architecture\", \"status\": \"In Progress\", \"url\": \"https://jira.example.com/browse/SC-42\" },\n  { \"key\": \"SC-41\", \"summary\": \"Wire up SSE codec\", \"status\": \"Open\", \"url\": \"https://jira.example.com/browse/SC-41\" } ] }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The completed activity carries <code>sources: [{ label: 'SC-42', url: '...' }, { label: 'SC-41', url: '...' }]<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> If the three stream parts used <em>different<\u002Fem> <code>activityId<\u002Fcode>s, Maya would see three stacked rows instead of one evolving \"Searching Jira → Searched Jira (2 results)\" row. If <code>readJiraToolScope<\u002Fcode> did not validate scope, <code>jiraClient.searchIssues<\u002Fcode> would be called with <code>undefined<\u002Fcode> IDs and either error or — worse — return another workspace's tickets.<\u002Fp>\n<hr>\n<h3 id=\"hop-13-map-runtime-events-to-protocol-events\">Hop 13 — Map runtime events to protocol events<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Internal <code>RuntimeEvent<\u002Fcode>s are not browser-safe by default. Core maps each to a <code>sidechat.*<\u002Fcode> event, advancing the protocol sequence only for browser-visible events.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>mapRuntimeEvent<\u002Fcode> is a pure switch. <code>runtime.started<\u002Fcode> maps to <code>undefined<\u002Fcode> (dropped — the browser already has <code>sidechat.started<\u002Fcode>); activities, deltas, completion, and errors map across. Here is the switch including the activity case the UI relies on:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>case RUNTIME_EVENT_TYPES.STARTED:      return undefined;\ncase RUNTIME_EVENT_TYPES.OUTPUT_DELTA: return { ...base, type: SIDECHAT_EVENT_TYPES.DELTA, content: event.content };\ncase RUNTIME_EVENT_TYPES.ACTIVITY:     return omitUndefinedProperties({ ...base,\n  type: SIDECHAT_EVENT_TYPES.ACTIVITY,\n  activityId: toActivityId(event.activityId),       // brand the id\n  activityKind: event.activityKind, status: event.status, title: event.title,\n  details: event.details ? mapRuntimeActivityDetails(event.details) : undefined }); // result + sources\ncase RUNTIME_EVENT_TYPES.COMPLETED:    return omitUndefinedProperties({ ...base, type: SIDECHAT_EVENT_TYPES.COMPLETED, finishReason: event.finishReason, usage: event.usage });\ncase RUNTIME_EVENT_TYPES.ERROR:        return { ...base, type: SIDECHAT_EVENT_TYPES.ERROR, code: mapRuntimeErrorCode(event.code), message: event.message, retryable: event.retryable };<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Crucially, the sequence number is only advanced for events that actually cross the browser contract. In <code>mapRuntimeEventEffect<\u002Fcode>, the counter is read, the event is mapped, and if the mapping returned <code>undefined<\u002Fcode> the function returns <em>without<\u002Fem> incrementing:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const event = mapRuntimeEvent(runtimeEvent, input.request, ports, sequence);\nif (!event) return undefined;                 // runtime.started → no sequence consumed\nyield* Ref.set(nextProtocolSequence, sequence + 1);\nreturn yield* rememberEvent(accumulator, event);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> Internal → external pairing for Maya's turn. <code>started<\u002Fcode> is 0; the counter began at 1; <code>runtime.started<\u002Fcode> is dropped and consumes nothing, so the numbers stay contiguous:<\u002Fp>\n<figure class=\"codeblock\"><pre><code>runtime.started              → (dropped, no sequence)\nruntime.activity (running)   → sidechat.activity  seq 1\nruntime.activity (completed) → sidechat.activity  seq 2   (result + sources)\nruntime.output_delta         → sidechat.delta     seq 3   \"Here are your 2 open tickets:\"\nruntime.completed            → sidechat.completed seq 4   usage { in:312, out:48, total:360 }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>What breaks without it.<\u002Fstrong> If <code>runtime.started<\u002Fcode> were <em>not<\u002Fem> dropped, the browser would receive two \"stream open\" signals and the protocol's single-<code>started<\u002Fcode> invariant would break. And the contiguity matters: the accumulator enforces <code>event.sequence === eventCount<\u002Fcode>, so if the counter had advanced for a dropped event, the next real event would arrive with a gap and the stream would be rejected as <code>INVALID_RUNTIME_SEQUENCE<\u002Fcode> (hop 15).<\u002Fp>\n<hr>\n<h3 id=\"hop-14-sse-wire-and-client-decode\">Hop 14 — SSE wire and client decode<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Each event is serialized to an SSE frame, flushed, and validated on the client. The client enforces the same ordering rules the server enforces — defense in depth.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> Server side, <code>encodeSseEvent<\u002Fcode> writes three lines and a blank line; the encoder embeds <code>eventId<\u002Fcode> and <code>type<\u002Fcode> <em>redundantly<\u002Fem> so the client can detect tampering:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>controller.enqueue(encoder.encode(encodeSseEvent(event)));\n// `id: ${event.eventId}\\nevent: ${event.type}\\ndata: ${JSON.stringify(event)}\\n\\n`<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>Client side, decoding happens in two distinct places, and it is worth knowing which file does which:<\u002Fp>\n<ol><li><strong>Frame structure + tamper check<\u002Fstrong> lives in <code>assertFrameMatchesPayload<\u002Fcode> inside <code>sse-codec.ts<\u002Fcode> (reached via <code>decodeSseEvents<\u002Fcode>). This is the check that the <code>event:<\u002Fcode> header and <code>id:<\u002Fcode> header agree with the JSON payload:<\u002Fli><\u002Fol>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// sse-codec.ts — assertFrameMatchesPayload\nif (fields.eventName &amp;&amp; fields.eventName !== event.type) {\n  throw new ProtocolValidationError(\"SSE event field does not match payload type\");\n}\nif (fields.eventId &amp;&amp; fields.eventId !== event.eventId) {\n  throw new ProtocolValidationError(\"SSE id field does not match payload eventId\");\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<ol><li><strong>Stream ordering<\u002Fstrong> lives in <code>validateIncrementalEvent<\u002Fcode> inside <code>sse-reader.ts<\u002Fcode>. This one checks <em>only<\u002Fem> that the sequence strictly increases and that nothing arrives after a terminal event — it does <strong>not<\u002Fstrong> look at headers:<\u002Fli><\u002Fol>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>// sse-reader.ts — validateIncrementalEvent\nif (event.sequence &lt;= state.previousSequence)\n  throw new ChatClientError('malformed_stream', 'SSE event sequence must increase');\nif (state.terminalSeen)\n  throw new ChatClientError('malformed_stream', 'SSE event received after terminal event');\nstate.previousSequence = event.sequence;\nif (isTerminalEvent(event)) state.terminalSeen = true;<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> A delta frame on the wire — note <code>sequence<\u002Fcode> is now <strong>3<\u002Fstrong> (started=0, two activity rows took 1 and 2):<\u002Fp>\n<figure class=\"codeblock\"><pre><code>id: evt_01jwzxa3f0abc004\nevent: sidechat.delta\ndata: {\"type\":\"sidechat.delta\",\"sequence\":3,\"content\":\"Here are your 2 open tickets:\",...}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The widget's <code>applyWidgetStreamEvent<\u002Fcode> then appends <code>content<\u002Fcode> to the assistant message and merges activity rows by <code>activityId<\u002Fcode>.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> A misconfigured proxy that reorders or duplicates SSE frames would, without the sequence check in <code>sse-reader.ts<\u002Fcode>, produce word-salad in Maya's message or a duplicated turn. The <code>terminalSeen<\u002Fcode> check guarantees the widget leaves <code>streaming<\u002Fcode> state — without it the panel would hang forever waiting for events after <code>sidechat.completed<\u002Fcode>. Separately, a frame whose <code>event:<\u002Fcode> header disagrees with its JSON <code>type<\u002Fcode> is rejected by <code>assertFrameMatchesPayload<\u002Fcode> in <code>sse-codec.ts<\u002Fcode> at parse time, blocking a spoofed early-terminate.<\u002Fp>\n<hr>\n<h3 id=\"hop-15-finalize-and-persist\">Hop 15 — Finalize and persist<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> After the stream drains, persist the outcome — exactly once, matching what the browser actually received.<\u002Fp>\n<p><strong>How it actually works here.<\u002Fstrong> <code>finalizeProtocolStream<\u002Fcode> runs as the <code>Stream.fromEffectDrain<\u002Fcode> segment (after all events flush, before the body closes). It reads the accumulator, validates the invariants (contiguous sequences, exactly one terminal in last position), then completes or fails the turn:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const state = yield* Ref.get(accumulator);\nyield* validateTerminalOrFailTurn(ports, turn, state);\nif (turn.assistantTurn.status === 'running') {\n  if (protocolTerminalErrorCode(state)) yield* failAssistantTurnFromTerminal(ports, turn, terminalCode);\n  else yield* completeAssistantTurnFromAccumulator(ports, input, turn, state); // assistantContent + usage\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><strong>The data at this point.<\u002Fstrong> The accumulator at finalization — <code>eventCount<\u002Fcode> is 5 (started + two activities + one delta + completed):<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>{ eventCount: 5, terminalCount: 1,\n  terminalEvent: { type: 'sidechat.completed', finishReason: 'stop', usage: { inputTokens: 312, outputTokens: 48 } },\n  assistantContent: 'Here are your 2 open tickets:', invalidReason: undefined }<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The turn row flips <code>running → completed<\u002Fcode>; <code>assistantContent<\u002Fcode> is stored from the accumulator, so finalization never replays the stream.<\u002Fp>\n<p><strong>What breaks without it.<\u002Fstrong> Two <code>sidechat.completed<\u002Fcode> events (a provider bug) would, without <code>validateProtocolAccumulator<\u002Fcode>, let core persist a <code>completed<\u002Fcode> row assembled from out-of-order events — a garbled saved answer. And because this runs as a drain segment, a crash between the last delta and persistence cannot leave the row stuck at <code>running<\u002Fcode> — the accumulator-then-persist ordering guarantees the outcome is written before the response body closes.<\u002Fp>\n<hr>\n<h3 id=\"sequence-diagram\">Sequence diagram<\u002Fh3>\n<div id=\"turn-tracer\"><\u002Fdiv>\n<p>The thread is complete: Maya's plain sentence left the browser with no role and no asserted identity, ten guarded pre-start steps confirmed her workspace authority and decided exactly which tools she could use, the runtime called <code>jira.search_issues<\u002Fcode> as <em>her<\u002Fem> and surfaced a live \"Searching Jira\" row, the answer streamed back token by token over a contiguous sequence (started=0, then 1, 2, 3, 4), and a single <code>completed<\u002Fcode> row recorded precisely what she saw — all split cleanly at the one byte that flips a JSON error into a streamed one.<\u002Fp>\n<hr>\n<h2 id=\"6-the-confusing-words-concept-then-implementation\">6. The Confusing Words: Concept, Then Implementation<\u002Fh2>\n<p>This is the decoder ring. Each term gets three beats: <strong>the idea<\u002Fstrong> (plain English plus an analogy), <strong>how it is actually built<\u002Fstrong> (real types, a real snippet, and how Maya's data moves through it), and <strong>why it is separate<\u002Fstrong> (the one thing that breaks if you fold it into something else).<\u002Fp>\n<p>We thread Maya through all of it. She is in the dashboard side panel and types <strong>\"show me my open Jira tickets\"<\u002Fstrong>. Watch the word <code>jira.search_issues<\u002Fcode> travel.<\u002Fp>\n<p>Before the deep dives, hold one map in your head. Three things sound alike but are not:<\u002Fp>\n<div class=\"tablewrap\"><table><thead><tr><th>Thing<\u002Fth><th>Lives where<\u002Fth><th>Holds<\u002Fth><th>One-line job<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td><strong>Registry<\u002Fstrong><\u002Ftd><td>composition only (boot)<\u002Ftd><td>live executables + secrets<\u002Ftd><td>\"what physically exists in this deployment\"<\u002Ftd><\u002Ftr><tr><td><strong>Manifest<\u002Fstrong><\u002Ftd><td>memory, per deployment<\u002Ftd><td>serializable declarations only<\u002Ftd><td>\"what we advertise the model <em>can<\u002Fem> use\"<\u002Ftd><\u002Ftr><tr><td><strong>Turn policy decision<\u002Fstrong><\u002Ftd><td>per request<\u002Ftd><td>resolved fields for one turn<\u002Ftd><td>\"what <em>this<\u002Fem> turn is authorized to use\"<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv>\n<p>Keep that table open. The registry and manifest entries below are the two the reader named, so they get the most depth.<\u002Fp>\n<hr>\n<h3 id=\"registry\">Registry<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A registry is a one-shot validator that runs at startup, checks every declaration, and hands back a frozen, name-indexed collection. It is <em>not<\u002Fem> a mutable map you add to at runtime. Think of airport check-in done once when the terminal opens: if any passenger's name does not match their boarding pass, the terminal does not open at all.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> Start with the unit of registration. A tool is declared once, pairing the thing the model sees with the thing that runs:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type ServiceToolRegistration = {\n  readonly name: string;\n  readonly capability: ToolCapability;   // what the MODEL sees (manifest)\n  readonly runtimeTool: RuntimeTool;      // the executable (agent-runtime)\n  readonly defaultEnabled: boolean;\n  readonly approvalPolicyIds: readonly string[];\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The name is taken from the runtime tool, so the two halves cannot be wired under different keys by accident:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceToolRegistration = ({ capability, runtimeTool, ... }) =&gt; ({\n  name: runtimeTool.name,   // canonical key\n  capability,\n  runtimeTool,\n  ...\n});<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>For Maya, the registration for her tool is built by <code>createJiraSearchIssuesRegistration<\u002Fcode>. Note it takes a real dependency — the Jira client — and uses it to build the executable half:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createJiraSearchIssuesRegistration = ({ jiraClient }) =&gt;\n  createServiceToolRegistration({\n    capability: {\n      name: JIRA_SEARCH_ISSUES_TOOL_NAME,        // \"jira.search_issues\"\n      description: \"Search Jira issues visible to the current user.\",\n      inputSchema: JIRA_SEARCH_ISSUES_INPUT_SCHEMA,\n    },\n    runtimeTool: createJiraSearchIssuesTool({ jiraClient }),\n  });<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>So the declared tool ships with its executable <em>and<\u002Fem> its Jira dependency already attached — <code>createJiraSearchIssuesRegistration({ jiraClient })<\u002Fcode> pairs the <code>jira.search_issues<\u002Fcode> capability with <code>createJiraSearchIssuesTool({ jiraClient })<\u002Fcode> as the <code>runtimeTool<\u002Fcode>. You cannot register the name the model sees without also registering the thing that runs.<\u002Fp>\n<p>Now the registry factory validates the whole list and splits it:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export const createServiceToolRegistry = (registrations) =&gt; {\n  const seenNames = new Set&lt;string&gt;();\n  for (const registration of registrations) {\n    assertMatchingNames(registration);          // capability.name === runtimeTool.name?\n    assertUniqueName(seenNames, registration.name);\n  }\n  return {\n    toolCapabilities: registrations.map((r) =&gt; r.capability),  // → manifest\n    runtimeTools:     registrations.map((r) =&gt; r.runtimeTool),  // → agent-runtime\n    defaultEnabledToolNames: registrations.filter((r) =&gt; r.defaultEnabled).map((r) =&gt; r.name),\n    status: { tools: registrations.map(toToolStatus) },\n  };\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>assertMatchingNames<\u002Fcode> is the lockstep mechanism. If a developer renames the capability to <code>jira.search<\u002Fcode> but leaves the runtime tool as <code>jira.search_issues<\u002Fcode>, the process throws at boot: <em>\"Tool registration jira.search_issues must match capability jira.search and runtime tool jira.search_issues.\"<\u002Fem> The server never starts. This is why the manifest's declaration surface and the executor's surface can never drift apart — they come from the same object.<\u002Fp>\n<p>The runtime side has a second registry: a frozen lookup-or-throw map. When core later sends the name <code>jira.search_issues<\u002Fcode>, agent-runtime resolves it here:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>resolve(name) {\n  const tool = byName.get(name);          // Map&lt;string, RuntimeTool&gt;\n  if (!tool) {\n    throw new AiRuntimeError(RUNTIME_ERROR_CODES.TOOL_UNAVAILABLE, `tool ${name} is not registered`);\n  }\n  return tool;\n}<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>No null, no fallback, no optional — a miss is a loud typed error naming the exact tool.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> A <code>switch (toolName)<\u002Fcode> in the request handler fails on the <em>first real request<\u002Fem>, silently returning null on a typo. The registry fails at <em>boot<\u002Fem>, loudly, with the broken name in the log — so the ops team sees the misconfiguration in the startup line, not buried in a mid-stream user-facing error hours later.<\u002Fp>\n<hr>\n<h3 id=\"manifest\">Manifest<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> The manifest is the printed menu the deployment hands out: a static, serializable list of what profiles, tools, and commands exist. It is built once at boot from the registries, has no executables and no secrets, and is narrowed per turn into a turn policy decision. The diner reads the menu; the diner never sees the kitchen inventory.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> It is a plain object. Here is the shape (trimmed) and the tool entry:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type HostCapabilityManifest = {\n  readonly schemaVersion: string;                       // 'sidechat.host-capabilities.v1'\n  readonly hostAppId: HostAppId;\n  readonly defaultAssistantProfileId: ProfileId;\n  readonly assistantProfiles: readonly AssistantProfile[];\n  readonly tools: readonly ToolCapability[];            // ← jira.search_issues lands here\n  readonly commands: readonly HostCommandCapability[];\n  readonly approvalPolicies: readonly ApprovalPolicy[];\n  readonly activityRenderers: readonly ActivityRendererCapability[];\n};\n\nexport type ToolCapability = {\n  readonly name: string;        // 'jira.search_issues'\n  readonly description: string; // 'Search Jira issues visible to the current user.'\n  readonly inputSchema: JsonObject;   // { type:'object', properties:{ query, maxResults }, ... }\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The <code>toolCapabilities<\u002Fcode> array from the registry becomes <code>manifest.tools<\u002Fcode>. Notice there is no <code>execute<\u002Fcode> here — just name, description, schema. That is the whole point: the manifest is declaration only.<\u002Fp>\n<p>The manifest is then <strong>hashed<\u002Fstrong> so any later change is detectable. <code>hashHostCapabilityManifest<\u002Fcode> serializes it to canonical JSON (keys sorted recursively) and SHA-256s it, producing a <code>ManifestHash<\u002Fcode> like <code>'sha256:9f86d081...'<\u002Fcode>. That hash is stamped onto every turn record.<\u002Fp>\n<p>Per request, <code>resolveAllowedTurnPlan<\u002Fcode> loads the manifest, hashes it, and turns it into a decision:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const manifest = yield* loadValidatedManifest(ports, input, authContext);\nconst manifestHash = hashHostCapabilityManifest(manifest);\nconst policyDecision = yield* resolveValidatedTurnPolicy(ports, input, authContext, manifest, manifestHash);<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p><code>loadManifest<\u002Fcode> checks the incoming <code>hostAppId<\u002Fcode>. A mismatch fails with <code>FORBIDDEN<\u002Fcode>, <strong>not<\u002Fstrong> \"not found\" — deliberately, so a caller cannot enumerate which host app ids have manifests by watching for 403 vs 404.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> Keep three things crisply apart:<\u002Fp>\n<ul><li><strong>Registry<\u002Fstrong> = executables + secrets, composition-only.<\u002Fli><li><strong>Manifest<\u002Fstrong> = serializable declarations, hashable, the thing core policy reads.<\u002Fli><li><strong>Turn policy decision<\u002Fstrong> = a <em>copy<\u002Fem> of the relevant profile fields plus the manifest hash, for one turn.<\u002Fli><\u002Ful>\n<p>The decision is not a pointer into the manifest. It is a flat copy that can be persisted and replayed; the <code>manifestHash<\u002Fcode> is the integrity link that lets you detect drift between when the turn was planned and when it ran.<\u002Fp>\n<hr>\n<h3 id=\"turn-policy-decision\">Turn policy decision<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> The order ticket for one diner at one table: for <em>this<\u002Fem> request, the chef may cook exactly these dishes. Even if a tool is on the menu (manifest), it is not authorized unless it is on the ticket.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> A closed allowlist copied from the resolved profile:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type TurnPolicyDecision = {\n  readonly profileId: ProfileId;\n  readonly profileVersion: string;                // pins the decision to one profile version\n  readonly providerId: ProviderId;\n  readonly modelId: ModelId;\n  readonly systemInstructions: string;\n  readonly executorId: ExecutorId;\n  readonly allowedToolNames: readonly string[];   // ['jira.search_issues']\n  readonly allowedCommandNames: readonly string[];\n  readonly approvalRequirements: readonly ApprovalRequirement[];\n  readonly manifestHash: ManifestHash;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>It is then cross-validated with a <em>two-layer<\u002Fem> check: every name in <code>allowedToolNames<\u002Fcode> must appear in <strong>both<\u002Fstrong> <code>manifest.tools<\u002Fcode> and <code>profile.defaultToolPolicy.allowedToolNames<\u002Fcode>. A name in only one set is rejected. The same validation also pins the decision to the resolved profile's version — if <code>decision.profileVersion<\u002Fcode> no longer matches the live profile, validation fails with <code>PROFILE_VERSION_MISMATCH<\u002Fcode>. So a stale decision carrying an old prompt and old allowlist cannot be replayed against an updated profile.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> The runtime receives <em>only<\u002Fem> the decision — never the manifest, never the registries. So <code>jira.search_issues<\u002Fcode> cannot reach the model unless it cleared registration, manifest declaration, <em>and<\u002Fem> the per-turn allowlist. A buggy policy resolver cannot grant more than the profile permits, because the decision is tamper-evident against the profile (both its tool set and its version).<\u002Fp>\n<hr>\n<h3 id=\"port-vs-adapter\">Port vs adapter<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A port is the job description (\"I need something that tells the time\"); an adapter is the hire that does it. Core writes against the description, the composition root supplies the hire.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> The port is just a TypeScript type. Core never imports <code>new Date()<\u002Fcode>:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>export type ClockPort = {\n  readonly now: () =&gt; string;\n};<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The adapter is a concrete value satisfying it — in tests a fixed-date stub, in production a <code>() =&gt; new Date().toISOString()<\u002Fcode>. Same for the runtime: <code>AiRuntimePort<\u002Fcode> is a re-export of a shared contract, so core only ever calls <code>.streamEffect(request)<\u002Fcode> and has no idea whether OpenAI or the in-memory fake provider (used in tests) is behind it.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> If core imported the OpenAI adapter directly, every unit test of Maya's turn would need a live API key, and swapping providers would mean editing core.<\u002Fp>\n<hr>\n<h3 id=\"repository\">Repository<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> A port specialized for storage. \"Be able to find a conversation and append a message\" — whether that is a JS array or Postgres is the adapter's problem.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> One contract, two implementations. The memory adapter returns an object literal backed by an array; the Postgres adapter returns the <em>same shape<\u002Fem> backed by Drizzle.<\u002Fp>\n<p>There is one name jump worth flagging so you can trace the call: core calls the port method <code>ports.conversations.appendUserMessage(...)<\u002Fcode>, but the repository contract behind it exposes that as <code>appendMessage<\u002Fcode> (in both the memory and Postgres adapters). It is <code>appendMessage<\u002Fcode> that runs the sequence-index transaction. So if you grep <code>appendUserMessage<\u002Fcode> you land in core's <code>ConversationRepositoryPort<\u002Fcode>; if you grep <code>appendMessage<\u002Fcode> you land in the SQL below.<\u002Fp>\n<p>For Maya's message, the Postgres <code>appendMessage<\u002Fcode> computes the sequence index in a transaction:<\u002Fp>\n<figure class=\"codeblock\"><span class=\"lang\">ts<\u002Fspan><pre><code>const [nextSequence] = await transaction\n  .select({ value: sql&lt;number&gt;`coalesce(max(${messages.sequenceIndex}), -1) + 1` })\n  .from(messages)\n  .where(and(eq(messages.workspaceId, command.workspaceId),\n             eq(messages.conversationId, command.conversationId)));<\u002Fcode><\u002Fpre><\u002Ffigure>\n<p>The memory adapter just counts the array. Core calls <code>ports.conversations.appendUserMessage(...)<\u002Fcode> and never knows which one ran.<\u002Fp>\n<p><strong>Why it is separate.<\u002Fstrong> The split is enforced by structural typing, not inheritance — core never calls <code>new Repository()<\u002Fcode>. You can run all of Maya's turn against the memory store in a test with no database.<\u002Fp>\n<hr>\n<h3 id=\"config\">Config<\u002Fh3>\n<p><strong>The idea.<\u002Fstrong> Raw environment values get turned into a typed options object once, at the edge, so the rest of the system reads fields, not <code>process.env<\u002Fcode>. The secret enters in one place and never travels further than it must.<\u002Fp>\n<p><strong>How it is actually built.<\u002Fstrong> A <code>RuntimeConfig<\u002Fcode> carries the secret. For OpenAI it is <code>{ provider: 'openai', apiKey, modelIds, defaultModelId, ... }<\u002Fcode>. That config flows into the provider <em>factory<\u002Fem>, <code>createServiceProviderBundle<\u002Fcode>, whose internal <code>providerRegistrationForConfig<\u002Fcode> lands the <code>apiKey<\u002Fcode> on t
