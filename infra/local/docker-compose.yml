services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sidechat
      POSTGRES_USER: sidechat
      POSTGRES_PASSWORD: sidechat
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidechat -d sidechat"]
      interval: 5s
      timeout: 5s
      retries: 12

  partner-ai-service:
    build:
      context: ../..
      dockerfile: infra/docker/partner-ai-service.Dockerfile
    environment:
      PORT: "8787"
      SIDECHAT_PROFILE: development
      SIDECHAT_AUTH_BEARER_TOKEN: local-compose-token
      SIDECHAT_TENANT_ID: tenant_local
      SIDECHAT_WORKSPACE_ID: workspace_local
      SIDECHAT_POLICY_MODE: allow_all
      SIDECHAT_DATABASE_URL: postgres://sidechat:sidechat@postgres:5432/sidechat
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:8787/healthz'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
