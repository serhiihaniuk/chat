services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sidechat
      POSTGRES_USER: sidechat
      POSTGRES_PASSWORD: sidechat
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidechat -d sidechat"]
      interval: 5s
      timeout: 5s
      retries: 12

  side-chat-service:
    build:
      context: ../..
      dockerfile: infra/docker/side-chat-service.Dockerfile
    environment:
      PORT: "8787"
      SIDECHAT_CONFIG: fake
      SIDECHAT_DATABASE_URL: postgres://sidechat:sidechat@postgres:5432/sidechat
      WORKFLOW_POSTGRES_URL: postgres://sidechat:sidechat@postgres:5432/sidechat
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"
    command:
      - sh
      - -c
      - npm run db:reset && npm run db:workflow:setup && npm run start --workspace @side-chat/side-chat-service
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:8787/healthz'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
