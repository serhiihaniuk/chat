services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sidechat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sidechat"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
  side-chat-api:
    image: node:25-alpine
    working_dir: /tmp
    command: >
      sh -c "
        rm -rf /tmp/sidechat-app &&
        mkdir -p /tmp/sidechat-app &&
        cp -a /app/package.json /app/pnpm-lock.yaml /app/pnpm-workspace.yaml /app/.npmrc /app/tsconfig.json /app/tsconfig.base.json /app/apps /app/packages /tmp/sidechat-app/ &&
        find /tmp/sidechat-app -name node_modules -type d -prune -exec rm -rf {} + &&
        cd /tmp/sidechat-app &&
        npm install -g pnpm@11.1.2 &&
        pnpm install --frozen-lockfile --ignore-scripts &&
        pnpm --filter @side-chat/side-chat-api dev
      "
    environment:
      DATABASE_URL: postgres://sidechat_app:sidechat_app@postgres:5432/sidechat
      USE_FAKE_MODEL: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
