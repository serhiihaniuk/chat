services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sidechat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sidechat"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
  side-chat-api:
    image: node:25-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace apps/side-chat-api"
    environment:
      DATABASE_URL: postgres://sidechat_app:sidechat_app@postgres:5432/sidechat
      USE_FAKE_MODEL: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
