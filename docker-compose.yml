services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sidechat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sidechat"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
  side-chat-api:
    image: node:25-alpine
    working_dir: /app
    command: sh -c "rm -rf /tmp/sidechat && mkdir -p /tmp/sidechat && tar --exclude=./node_modules --exclude=./apps/*/node_modules --exclude=./packages/*/node_modules --exclude=./.git -cf - . | tar -C /tmp/sidechat -xf - && cd /tmp/sidechat && npm install -g pnpm@11.1.2 && pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true && pnpm --filter @side-chat/side-chat-api dev"
    environment:
      DATABASE_URL: postgres://sidechat_app:sidechat_app@postgres:5432/sidechat
      USE_FAKE_MODEL: "true"
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
