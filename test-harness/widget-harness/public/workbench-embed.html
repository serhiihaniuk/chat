<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbench Embed Harness</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #1c1d22;
        background: #eef0f4;
      }

      main {
        min-height: 100%;
        padding: 24px;
        box-sizing: border-box;
      }

      #host-records {
        max-width: 460px;
        padding: 20px;
        border-radius: 16px;
        border: 1px solid #e2e3e7;
        background: #fff;
        box-shadow: 0 18px 48px rgb(20 22 28 / 0.1);
      }

      #host-records h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      #host-records p.lede {
        margin: 0 0 16px;
        font-size: 13px;
        color: #52555f;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        background: #eef0f3;
        border-radius: 6px;
        padding: 1px 6px;
      }

      #record-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      #record-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #e7e8ec;
        background: #f7f8fa;
      }

      #record-list li.active {
        border: 1px solid #3b6cf0;
        background: #eef3ff;
        box-shadow: inset 0 0 0 1px #3b6cf0;
      }

      #record-list li .open {
        margin-left: auto;
        font-size: 11px;
        font-weight: 700;
        color: #3b6cf0;
      }

      #host-status {
        margin: 14px 0 0;
        font-size: 13px;
        color: #52555f;
      }

      button#assistant-toggle {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 20;
        border: 1px solid #d4d4d8;
        border-radius: 6px;
        background: #fff;
        padding: 8px 12px;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.16);
        cursor: pointer;
      }

      iframe {
        position: fixed;
        right: 16px;
        bottom: 64px;
        z-index: 10;
        display: block;
        width: min(1200px, calc(100vw - 32px));
        height: min(90vh, calc(100vh - 80px));
        min-height: min(620px, calc(100vh - 80px));
        border: 0;
      }

      iframe[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="host-records">
        <h1>Workbench (host page)</h1>
        <p class="lede">
          This page is the host app. The assistant opens records here through the
          <code>open_resource</code> host command, forwarded from the iframe.
        </p>
        <ul id="record-list"></ul>
        <p id="host-status">No host commands yet.</p>
      </section>
      <button
        id="assistant-toggle"
        type="button"
        aria-controls="assistant-frame"
        aria-expanded="false"
      >
        Open assistant
      </button>
      <iframe
        id="assistant-frame"
        title="Workspace Assistant"
        allow="clipboard-write"
        hidden
      ></iframe>
    </main>
    <script type="module">
      // These message types must match `src/host/post-message-host-bridge.ts` and
      // the open-state handshake in `src/app/harness-app.tsx`.
      const SET_OPEN_MESSAGE_TYPE = "sidechat.widget.setOpen";
      const OPEN_CHANGE_MESSAGE_TYPE = "sidechat.widget.openChange";
      const READY_MESSAGE_TYPE = "sidechat.widget.ready";
      const HOST_COMMAND_MESSAGE_TYPE = "sidechat.widget.hostCommand";
      const HOST_COMMAND_RESULT_MESSAGE_TYPE = "sidechat.widget.hostCommandResult";

      const params = new URLSearchParams(window.location.search);
      const frame = document.querySelector("iframe");
      const button = document.querySelector("#assistant-toggle");
      const recordList = document.querySelector("#record-list");
      const statusEl = document.querySelector("#host-status");
      let open = params.get("open") === "true";

      const framePath = params.get("framePath") ?? "/side-chat-frame/";
      const frameUrl = new URL(framePath, window.location.origin);
      frameUrl.searchParams.set("mode", params.get("mode") ?? "local-service");
      frameUrl.searchParams.set("workspaceId", params.get("workspaceId") ?? "workspace_e2e");
      frameUrl.searchParams.set("authToken", params.get("authToken") ?? "local-compose-token");
      frameUrl.searchParams.set("apiBaseUrl", params.get("apiBaseUrl") ?? "/side-chat-api");
      frameUrl.searchParams.set("openControl", "host");
      frameUrl.searchParams.set("open", String(open));
      frame.src = frameUrl.toString();

      // Host-owned records. A real workbench renders its own business UI here.
      const records = [
        { id: "ticket-4821", label: "Support ticket #4821" },
        { id: "invoice-1042", label: "Invoice #1042" },
        { id: "customer-acme", label: "Customer · Acme Corp" },
      ];
      let activeId = null;

      const renderRecords = () => {
        recordList.replaceChildren(
          ...records.map((record) => {
            const li = document.createElement("li");
            if (record.id === activeId) li.className = "active";
            const label = document.createElement("span");
            label.textContent = record.label;
            li.append(label);
            if (record.id === activeId) {
              const badge = document.createElement("span");
              badge.className = "open";
              badge.textContent = "● Open";
              li.append(badge);
            }
            return li;
          }),
        );
      };

      // Perform the host action and return a result for the widget timeline.
      const handleHostCommand = (command) => {
        if (command.commandName !== "open_resource") {
          return { status: "unsupported", resultCode: "unknown_command" };
        }
        const id = command.payload?.resourceId;
        if (typeof id !== "string") return { status: "failed", resultCode: "missing_resource_id" };
        if (!records.some((record) => record.id === id)) records.push({ id, label: id });
        activeId = id;
        renderRecords();
        statusEl.textContent = `Assistant opened: ${id}`;
        return { status: "applied", resultCode: "workbench_opened", data: { persisted: false } };
      };

      const sendOpenState = () => {
        frame.contentWindow?.postMessage(
          { type: SET_OPEN_MESSAGE_TYPE, open },
          window.location.origin,
        );
        frame.hidden = !open;
        button.setAttribute("aria-expanded", String(open));
        button.textContent = open ? "Close assistant" : "Open assistant";
      };

      button.addEventListener("click", () => {
        open = !open;
        sendOpenState();
      });

      frame.addEventListener("load", sendOpenState);
      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin) return;
        const data = event.data;
        if (data?.type === READY_MESSAGE_TYPE) {
          sendOpenState();
          return;
        }
        if (data?.type === HOST_COMMAND_MESSAGE_TYPE && data.command) {
          const result = handleHostCommand(data.command);
          frame.contentWindow?.postMessage(
            { type: HOST_COMMAND_RESULT_MESSAGE_TYPE, commandId: data.command.commandId, result },
            window.location.origin,
          );
          return;
        }
        if (data?.type !== OPEN_CHANGE_MESSAGE_TYPE) return;
        open = data.open;
        sendOpenState();
      });

      renderRecords();
    </script>
  </body>
</html>
