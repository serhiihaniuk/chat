<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbench Embed Harness</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #1c1d22;
        background: #eef0f4;
      }

      main {
        min-height: 100%;
        padding: 24px;
        box-sizing: border-box;
      }

      #host-records {
        max-width: 460px;
        padding: 20px;
        border: 1px solid #e2e3e7;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 18px 48px rgb(20 22 28 / 0.1);
      }

      #host-records h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      #host-records p.lede {
        margin: 0 0 16px;
        color: #52555f;
        font-size: 13px;
      }

      code {
        padding: 1px 6px;
        border-radius: 6px;
        background: #eef0f3;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      #record-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      #record-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border: 1px solid #e7e8ec;
        border-radius: 10px;
        background: #f7f8fa;
      }

      #record-list li.active {
        border-color: #3b6cf0;
        background: #eef3ff;
        box-shadow: inset 0 0 0 1px #3b6cf0;
      }

      #record-list li .open {
        margin-left: auto;
        color: #3b6cf0;
        font-size: 11px;
        font-weight: 700;
      }

      #host-status {
        margin: 14px 0 0;
        color: #52555f;
        font-size: 13px;
      }

      #assistant-toggle {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 20;
        padding: 8px 12px;
        border: 1px solid #d4d4d8;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 10px 30px rgb(15 23 42 / 0.16);
        cursor: pointer;
      }

      iframe {
        position: fixed;
        right: 16px;
        bottom: 64px;
        z-index: 10;
        display: block;
        width: min(1200px, calc(100vw - 32px));
        height: min(90vh, calc(100vh - 80px));
        min-height: min(620px, calc(100vh - 80px));
        border: 0;
      }

      iframe[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="host-records">
        <h1>Workbench (host page)</h1>
        <p class="lede">
          This page is the host app. The assistant opens records here through the
          <code>open_resource</code> client tool, forwarded from the iframe.
        </p>
        <ul id="record-list"></ul>
        <p id="host-status">No client tools yet.</p>
      </section>
      <button
        id="assistant-toggle"
        type="button"
        aria-controls="assistant-frame"
        aria-expanded="false"
      >
        Open assistant
      </button>
      <iframe
        id="assistant-frame"
        title="Workspace Assistant"
        allow="clipboard-write"
        hidden
      ></iframe>
    </main>
    <script type="module" src="/src/host/workbench-embed.ts"></script>
  </body>
</html>
