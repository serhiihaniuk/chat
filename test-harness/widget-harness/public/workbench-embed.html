<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workbench Embed Harness</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      main {
        min-height: 100%;
        padding: 16px;
      }

      button {
        border: 1px solid #d4d4d8;
        border-radius: 6px;
        background: #fff;
        padding: 8px 12px;
      }

      iframe {
        display: block;
        width: min(1200px, calc(100vw - 32px));
        height: min(900px, calc(100vh - 72px));
        min-height: 620px;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <button id="assistant-toggle" type="button">Open assistant</button>
      <iframe title="Workspace Assistant" allow="clipboard-write"></iframe>
    </main>
    <script type="module">
      const SET_OPEN_MESSAGE_TYPE = "sidechat.widget.setOpen";
      const OPEN_CHANGE_MESSAGE_TYPE = "sidechat.widget.openChange";
      const params = new URLSearchParams(window.location.search);
      const frame = document.querySelector("iframe");
      const button = document.querySelector("#assistant-toggle");
      let open = false;

      const framePath = params.get("framePath") ?? "/side-chat-frame/";
      const frameUrl = new URL(framePath, window.location.origin);
      frameUrl.searchParams.set("mode", "local-service");
      frameUrl.searchParams.set("workspaceId", params.get("workspaceId") ?? "workspace_e2e");
      frameUrl.searchParams.set("authToken", params.get("authToken") ?? "local-compose-token");
      frameUrl.searchParams.set("apiBaseUrl", params.get("apiBaseUrl") ?? "/api");
      frameUrl.searchParams.set("openControl", "host");
      frameUrl.searchParams.set("open", "false");
      frame.src = frameUrl.toString();

      const sendOpenState = () => {
        frame.contentWindow?.postMessage(
          { type: SET_OPEN_MESSAGE_TYPE, open },
          window.location.origin,
        );
        button.textContent = open ? "Close assistant" : "Open assistant";
      };

      button.addEventListener("click", () => {
        open = !open;
        sendOpenState();
      });

      frame.addEventListener("load", sendOpenState);
      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin) return;
        if (event.data?.type !== OPEN_CHANGE_MESSAGE_TYPE) return;
        open = event.data.open;
        sendOpenState();
      });
    </script>
  </body>
</html>
